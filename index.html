<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Marriage Readiness Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F7F4EF;font-family:'DM Sans',sans-serif;color:#1B1714;-webkit-font-smoothing:antialiased}
.serif{font-family:'Cormorant Garamond',Georgia,serif}
.app{min-height:100vh;background:#F7F4EF}
.wrap{max-width:600px;margin:0 auto;padding:0 22px 80px}
.screen{animation:fadeIn .35s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{background:#fff;border:1px solid #DFD6CC;border-radius:12px}
.btn-primary{background:#A85240;color:#fff;border:none;border-radius:8px;padding:13px 28px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:all .15s;letter-spacing:.02em}
.btn-primary:hover:not(:disabled){background:#8D4435;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.38;cursor:not-allowed}
.btn-ghost{background:transparent;color:#6B645C;border:1.5px solid #DFD6CC;border-radius:8px;padding:11px 20px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;transition:all .15s}
.btn-ghost:hover:not(:disabled){border-color:#A85240;color:#A85240}
.btn-ghost:disabled{opacity:.3;cursor:not-allowed}
.progress-bar{height:2px;background:#DFD6CC;border-radius:2px;overflow:hidden;margin-bottom:36px}
.progress-fill{height:100%;background:#A85240;border-radius:2px;transition:width .4s ease}
.score-opt{cursor:pointer;border-radius:10px;padding:15px 18px;transition:all .15s ease;display:flex;gap:14px;align-items:flex-start;border:1.5px solid #DFD6CC;background:#fff;margin-bottom:10px}
.score-opt:hover{transform:translateY(-1px);border-color:#b5a99e}
.score-opt.sel-2{background:#EAF3EC;border-color:#3D6E50}
.score-opt.sel-1{background:#FBF5E6;border-color:#8B6A1A}
.score-opt.sel-0{background:#FAE8E5;border-color:#A85240}
.score-num{min-width:32px;height:32px;border-radius:7px;background:#E2D9D0;color:#6B645C;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:500;font-family:'Cormorant Garamond',serif;transition:all .15s;flex-shrink:0}
.sel-2 .score-num{background:#3D6E50;color:#fff}
.sel-1 .score-num{background:#8B6A1A;color:#fff}
.sel-0 .score-num{background:#A85240;color:#fff}
.score-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;color:#6B645C}
.sel-2 .score-label{color:#3D6E50}
.sel-1 .score-label{color:#7C5E1A}
.sel-0 .score-label{color:#A85240}
.score-text{font-size:14px;color:#1B1714;line-height:1.62}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.review-head{background:#EEE9E3;border-bottom:1px solid #DFD6CC}
.review-head div{padding:11px 14px;font-size:11px;font-weight:500;color:#6B645C;text-transform:uppercase;letter-spacing:.1em}
.review-row{border-bottom:1px solid #f0ebe4}
.review-row:last-child{border-bottom:none}
.review-cell{padding:13px 14px;font-size:14px;color:#1B1714;display:flex;align-items:center}
.review-cell.center{justify-content:center}
.score-badge{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;font-family:'Cormorant Garamond',serif}
.b2{background:#EAF3EC;color:#3D6E50;border:1.5px solid #3D6E50}
.b1{background:#FBF5E6;color:#7C5E1A;border:1.5px solid #8B6A1A}
.b0{background:#FAE8E5;color:#A85240;border:1.5px solid #A85240}
.section{border-radius:12px;padding:20px 24px;margin-bottom:18px}
.section-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px}
.spin{width:36px;height:36px;border:2px solid #DFD6CC;border-top:2px solid #A85240;border-radius:50%;animation:spin 1.1s linear infinite;margin:0 auto 22px}
@keyframes spin{to{transform:rotate(360deg)}}
.tag-key{font-size:10px;background:#EEE9E3;color:#6B645C;padding:1px 5px;border-radius:3px;margin-left:6px;vertical-align:middle}
.gate-warn{background:#FAE8E5;border:1px solid #c87060;border-radius:8px;padding:10px 14px;margin-bottom:18px;font-size:12px;color:#A85240}
.totals{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:30px}
.total-card{background:#fff;border:1px solid #DFD6CC;border-radius:10px;padding:16px;text-align:center}
.partner-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:600;flex-shrink:0;letter-spacing:0}
.name-input{width:100%;padding:13px 16px;border:1.5px solid #DFD6CC;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:16px;color:#1B1714;background:#fff;outline:none;transition:border-color .15s}
.name-input:focus{border-color:#A85240}
.name-input::placeholder{color:#C4BAB0}
.mode-card{cursor:pointer;border:1.5px solid #DFD6CC;border-radius:12px;padding:20px 18px;background:#fff;transition:all .15s;text-align:left;width:100%}
.mode-card:hover{border-color:#A85240;transform:translateY(-1px)}
.mode-card.selected{border-color:#A85240;background:#FDF5F3}
</style>
</head>
<body>
<div class="app"><div class="wrap" id="root"></div></div>
<script>
const Q=[
  {id:1,gate:true,hw:true,title:"Safety, respect & autonomy",
   thesis:"A relationship cannot be marriage-ready while one partner is managing fear, coercive control, or aggression.",
   opts:{2:"No fear-based behavior. No intimidation, threats, sexual pressure, surveillance, financial control, or physical aggression. Boundaries and \"no\" are respected.",
        1:"No pattern of fear or control, but occasional disrespectful moments or boundary slips that are acknowledged, repaired, and decreasing.",
        0:"Any current pattern of intimidation, coercion, fear, sexual pressure, stalking/surveillance, financial control, or physical aggression."}},
  {id:2,hw:true,title:"Clear, mutual commitment",
   thesis:"The key is dedication — an intrinsic desire to build a future together, not just constraints that make leaving harder.",
   opts:{2:"Both of us clearly choose marriage for positive, shared reasons and can explain why now. We are not using marriage to fix major problems.",
        1:"Both lean toward marriage, but reasons are partly vague, externally driven, or ahead of full clarity.",
        0:"One partner is substantially unsure, or marriage is being used to fix trust/compatibility problems, avoid a breakup, or satisfy external pressure."}},
  {id:3,title:"Conflict skills & repair",
   thesis:"Conflict itself is normal. The question is whether disagreements become destructive and whether the couple can recover.",
   opts:{2:"Disagreements stay specific and respectful. No contempt, humiliation, or character attacks. We apologize, repair, and return to warmth.",
        1:"We sometimes escalate, pursue/withdraw, or avoid, but repair is reliable and our fights lead to learning.",
        0:"Conflicts regularly become cruel, contemptuous, silent-punitive, explosive, or circular with no real repair."}},
  {id:4,title:"Emotion regulation under stress",
   thesis:"When partners get emotionally flooded, listening and problem-solving break down. Regulation is a shared process.",
   opts:{2:"We notice when we are flooded, call a respectful pause, self-soothe, and come back to the conversation.",
        1:"Stress can trigger shutdown, defensiveness, or anger, but with effort we recover and prevent lasting damage.",
        0:"Stress routinely leads to outbursts, contempt, cold withdrawal, or rupture that lingers and spreads."}},
  {id:5,hw:true,title:"Trustworthiness & transparency",
   thesis:"Trust is foundational. Lack of it is associated with lying and lower relationship quality across all domains.",
   opts:{2:"We are honest about finances, outside relationships, digital boundaries, priorities, and loyalties. Transparency is voluntary, not surveillance.",
        1:"There are sensitive spots or past secrecy, but both are actively rebuilding trust with concrete follow-through.",
        0:"Repeated lying, hidden debt, covert contact, betrayal, or chronic suspicion is a current theme."}},
  {id:6,hw:true,title:"Alignment on non-negotiables",
   thesis:"Unresolved incompatibilities in high-stakes life domains keep producing the same fight and predict later problems.",
   opts:{2:"We have explicit, workable agreements on children, money, values/religion, career/location, family boundaries, and lifestyle.",
        1:"We agree on some, but at least one major domain is still vague, avoided, or overly idealized.",
        0:"There is a major unresolved incompatibility, or one or both of us refuses to decide."}},
  {id:7,title:"Team coping: us vs. the problem",
   thesis:"Couples do better when stress becomes a shared task rather than evidence that the partner is the problem.",
   opts:{2:"When life gets hard, we share stress clearly, ask directly for help, and coordinate rather than blame.",
        1:"Stress sometimes makes us adversarial, but we can reset and cooperate.",
        0:"Stress routinely turns into blame, scorekeeping, isolation, or sabotage."}},
  {id:8,title:"Fairness in visible & invisible labor",
   thesis:"The question is perceived fairness in both visible work and the invisible mental load — not perfect 50/50.",
   opts:{2:"Chores, admin, planning, remembering, and emotional labor feel fair enough to both of us, and we renegotiate when life changes.",
        1:"There is a noticeable imbalance, but it is named and actively being rebalanced.",
        0:"One partner chronically carries the load and feels unseen, resentful, or dismissed."}},
  {id:9,gate:true,hw:true,title:"Sexual respect, consent & intimacy",
   thesis:"Strong couples are not perfectly matched in desire; they can talk safely about consent, boundaries, and differences.",
   opts:{2:"We can talk openly and respectfully about sex, consent, desire differences, boundaries, health, and what helps intimacy.",
        1:"The topic is awkward or intermittent, but we can communicate when it matters.",
        0:"Sex involves fear, shame, coercion, chronic avoidance, ignored pain, or inability to say no safely."}},
  {id:10,title:"Learning & help-seeking",
   thesis:"Relationship skills are learnable. Openness to tools and support is a resilience factor, not a weakness.",
   opts:{2:"We can take feedback, own our part, use tools, and seek support before a crisis.",
        1:"We are somewhat open, but defensiveness or delay in help-seeking gets in the way.",
        0:"One or both of us rejects feedback, blames only the other, or refuses any tools or support."}}
];

const SC={2:{cls:'b2',label:'Doing well',selCls:'sel-2'},1:{cls:'b1',label:'Some growth needed',selCls:'sel-1'},0:{cls:'b0',label:'Significant concern',selCls:'sel-0'}};
const PC={A:'#3B7A7C',B:'#6A55A0'};

let S={
  screen:'intro', mode:null,
  names:{A:'',B:''},
  scores:{A:Array(10).fill(null),B:Array(10).fill(null)},
  partner:'A', qIdx:0, result:null, loading:false, error:null
};

const set=p=>{S={...S,...p};render();};
const nOf=p=>S.names[p]||(p==='A'?'Partner A':'Partner B');
const abbr=str=>str.length>8?str.slice(0,7)+'…':str;

function setScore(v){const s=JSON.parse(JSON.stringify(S.scores));s[S.partner][S.qIdx]=v;set({scores:s});}

function goNext(){
  if(S.qIdx<9){set({qIdx:S.qIdx+1});}
  else if(S.mode==='couple'&&S.partner==='A'){set({partner:'B',qIdx:0});}
  else{set({screen:'review'});}
}
function goPrev(){
  if(S.qIdx>0){set({qIdx:S.qIdx-1});}
  else if(S.mode==='couple'&&S.partner==='B'){set({partner:'A',qIdx:9});}
  else{set({screen:'intro'});}
}
function hasSafetyFlag(){
  return S.scores.A[0]===0||S.scores.A[8]===0||(S.mode==='couple'&&(S.scores.B[0]===0||S.scores.B[8]===0));
}
function restart(){
  set({screen:'intro',mode:null,names:{A:'',B:''},scores:{A:Array(10).fill(null),B:Array(10).fill(null)},partner:'A',qIdx:0,result:null,loading:false,error:null});
}

async function analyze(){
  if(hasSafetyFlag()){set({screen:'safety'});return;}
  set({screen:'loading',loading:true,error:null});
  const nA=nOf('A'),nB=nOf('B');
  let prompt;
  if(S.mode==='couple'){
    const rows=Q.map((q,i)=>`Item ${q.id} (${q.title}): ${nA}=${S.scores.A[i]}, ${nB}=${S.scores.B[i]}${q.hw?' [high-weight]':''}${q.gate?' [gatekeeper]':''}`).join('\n');
    prompt=`You are a compassionate, science-informed relationship counselor. Two partners named ${nA} and ${nB} independently completed a marriage readiness assessment (0=significant concern, 1=some growth needed, 2=doing well).

Results:
${rows}

Return ONLY valid JSON, no markdown, no code fences:
{"overview":"2-3 honest sentences on overall readiness, addressing them by name","flags":[{"item":"Item N: title","concern":"1-2 sentences"}],"strengths":["sentence using names"],"growthAreas":[{"area":"short label","advice":"2-3 actionable sentences"}],"closing":"1-2 warm sentences to both ${nA} and ${nB}"}

Rules: use ${nA} and ${nB} by name throughout. Flags only for score 0, both at 1 on high-weight, or discrepancy ≥2. Note discrepancies. 2-4 strengths, 2-4 growth areas. Warm and concrete, never preachy.`;
  } else {
    const rows=Q.map((q,i)=>`Item ${q.id} (${q.title}): ${nA}=${S.scores.A[i]}${q.hw?' [high-weight]':''}${q.gate?' [gatekeeper]':''}`).join('\n');
    prompt=`You are a compassionate, science-informed relationship counselor. A person named ${nA} reflected on their relationship from their own perspective using a marriage readiness self-assessment (0=significant concern, 1=some growth needed, 2=doing well).

Results:
${rows}

Return ONLY valid JSON, no markdown, no code fences:
{"overview":"2-3 honest sentences on what ${nA}'s scores reveal about how they see the relationship","flags":[{"item":"Item N: title","concern":"1-2 sentences framed for one person's perspective"}],"strengths":["sentence addressing ${nA} directly"],"growthAreas":[{"area":"short label","advice":"2-3 sentences framed personally for ${nA}"}],"closing":"1-2 warm sentences to ${nA} acknowledging the self-awareness this takes"}

Rules: use ${nA} by name. Flags for score 0 or 1 on high-weight items. 2-4 strengths, 2-4 growth areas. Warm, concrete, never preachy.`;
  }
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    if(data.error)throw new Error(typeof data.error==='object'?data.error.message:data.error);
    const txt=data.content?.map(b=>b.text||'').join('')||'';
    const parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
    set({result:parsed,screen:'results',loading:false});
  }catch(e){set({error:'Analysis failed: '+(e.message||'Please try again.'),screen:'review',loading:false});}
}

function badge(v){
  if(v===null)return `<div class="score-badge" style="background:#f0ebe4;border:1.5px solid #dfd6cc;color:#bbb">—</div>`;
  return `<div class="score-badge ${SC[v].cls}">${v}</div>`;
}

function render(){
  const {screen,scores,partner,qIdx,result,error,mode,names}=S;
  const q=Q[qIdx];
  const cur=scores[partner][qIdx];
  const isCouple=mode==='couple';
  const steps=isCouple?20:10;
  const step=isCouple?(partner==='A'?qIdx:10+qIdx):qIdx;
  const prog=(step/steps)*100;
  let html='';

  /* INTRO */
  if(screen==='intro'){
    const ok=mode&&names.A.trim()&&(mode==='single'||(mode==='couple'&&names.B.trim()));
    html=`<div class="screen" style="padding-top:60px">
      <div style="text-align:center;margin-bottom:40px">
        <div style="font-size:11px;letter-spacing:.16em;color:#6B645C;text-transform:uppercase;margin-bottom:14px">Relationship Assessment</div>
        <h1 class="serif" style="font-size:52px;font-weight:400;line-height:1.1;color:#1B1714;font-style:italic;margin-bottom:14px">Are we ready?</h1>
        <p style="font-size:15px;color:#6B645C;line-height:1.72;max-width:400px;margin:0 auto;font-weight:300">A science-informed self-assessment for couples — or for individual reflection.</p>
      </div>

      <div style="margin-bottom:26px">
        <div style="font-size:11px;font-weight:500;color:#6B645C;letter-spacing:.09em;text-transform:uppercase;margin-bottom:12px">How are you taking this?</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <button class="mode-card${mode==='couple'?' selected':''}" onclick="set({mode:'couple'})">
            <div style="font-size:28px;margin-bottom:10px">👫</div>
            <div style="font-size:15px;font-weight:500;color:#1B1714;margin-bottom:5px">Together</div>
            <div style="font-size:13px;color:#6B645C;line-height:1.5">Both partners answer independently, then compare</div>
          </button>
          <button class="mode-card${mode==='single'?' selected':''}" onclick="set({mode:'single'})">
            <div style="font-size:28px;margin-bottom:10px">🪞</div>
            <div style="font-size:15px;font-weight:500;color:#1B1714;margin-bottom:5px">Just me</div>
            <div style="font-size:13px;color:#6B645C;line-height:1.5">Reflect on your relationship from your own perspective</div>
          </button>
        </div>
      </div>

      <div style="margin-bottom:34px">
        <div style="font-size:11px;font-weight:500;color:#6B645C;letter-spacing:.09em;text-transform:uppercase;margin-bottom:12px">${mode==='single'?'Your name':'Your names'}</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <div style="position:relative">
            ${isCouple?`<div style="position:absolute;left:13px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;background:${PC.A};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;pointer-events:none">1</div>`:''}
            <input class="name-input" style="${isCouple?'padding-left:45px':''}" type="text" maxlength="24" placeholder="${mode==='single'?'Your name or nickname':'First partner — name or nickname'}" value="${names.A}" oninput="set({names:{...S.names,A:this.value}})">
          </div>
          ${isCouple?`<div style="position:relative">
            <div style="position:absolute;left:13px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;background:${PC.B};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;pointer-events:none">2</div>
            <input class="name-input" style="padding-left:45px" type="text" maxlength="24" placeholder="Second partner — name or nickname" value="${names.B}" oninput="set({names:{...S.names,B:this.value}})">
          </div>`:''}
        </div>
      </div>

      <div style="text-align:center">
        <button class="btn-primary" style="font-size:16px;padding:15px 46px" onclick="set({screen:'questions',partner:'A',qIdx:0})" ${!ok?'disabled':''}>Begin →</button>
        <p style="font-size:12px;color:#B4ADA6;margin-top:14px;line-height:1.6">Score 0, 1, or 2 based on the past 6–12 months.<br>Names stay in your browser — never stored anywhere.</p>
      </div>
    </div>`;
  }

  /* QUESTIONS */
  else if(screen==='questions'){
    const pName=nOf(partner);
    const isFirst=qIdx===0;
    const isLast=qIdx===9&&(partner==='B'||!isCouple);
    const nextLabel=qIdx===9&&partner==='A'&&isCouple?`${abbr(nOf('B'))}'s turn →`:isLast?'Review answers':'Next →';
    html=`<div class="screen" style="padding-top:44px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="partner-dot" style="background:${PC[partner]}">${abbr(pName).slice(0,2).toUpperCase()}</div>
          <span style="font-size:14px;color:#6B645C">${isCouple?abbr(pName)+"'s turn":'Your reflection'}</span>
        </div>
        <span style="font-size:13px;color:#6B645C">${qIdx+1} / 10</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
      ${q.gate?`<div class="gate-warn">⚠ Gatekeeper — a score of 0 shows safety resources instead of AI analysis</div>`:''}
      <h2 class="serif" style="font-size:30px;font-weight:500;color:#1B1714;margin-bottom:9px;line-height:1.22">${q.title}</h2>
      <p style="font-size:14px;color:#6B645C;line-height:1.65;margin-bottom:26px">${q.thesis}</p>
      ${[2,1,0].map(v=>`<div class="score-opt${cur===v?' '+SC[v].selCls:''}" onclick="setScore(${v})">
        <div class="score-num">${v}</div>
        <div><div class="score-label">${SC[v].label}</div><div class="score-text">${q.opts[v]}</div></div>
      </div>`).join('')}
      <div class="nav-row" style="margin-top:20px">
        <button class="btn-ghost" onclick="goPrev()">← Back</button>
        <button class="btn-primary" onclick="goNext()" ${cur===null?'disabled':''}>${nextLabel}</button>
      </div>
    </div>`;
  }

  /* REVIEW */
  else if(screen==='review'){
    const nA=nOf('A'),nB=nOf('B');
    const tA=scores.A.reduce((a,b)=>a+(b??0),0);
    const tB=scores.B.reduce((a,b)=>a+(b??0),0);
    const colsCouple='1fr 68px 68px', colsSingle='1fr 80px';
    html=`<div class="screen" style="padding-top:44px">
      <div style="font-size:11px;letter-spacing:.12em;color:#6B645C;text-transform:uppercase;margin-bottom:10px">Review</div>
      <h2 class="serif" style="font-size:36px;font-weight:400;color:#1B1714;margin-bottom:8px;font-style:italic">Your answers</h2>
      <p style="font-size:14px;color:#6B645C;line-height:1.65;margin-bottom:26px">Everything look right? Edit or continue to get your analysis.</p>
      ${error?`<div style="background:#FAE8E5;border:1px solid #A85240;border-radius:8px;padding:12px 16px;margin-bottom:18px;font-size:14px;color:#A85240">${error}</div>`:''}
      <div class="card" style="overflow:hidden;margin-bottom:22px">
        <div style="display:grid;grid-template-columns:${isCouple?colsCouple:colsSingle}" class="review-head">
          <div>Item</div>
          <div style="text-align:center;color:${PC.A}">${abbr(nA)}</div>
          ${isCouple?`<div style="text-align:center;color:${PC.B}">${abbr(nB)}</div>`:''}
        </div>
        ${Q.map((q,i)=>{
          const sA=scores.A[i],sB=scores.B[i];
          const disc=isCouple&&sA!==null&&sB!==null&&Math.abs(sA-sB)>=2;
          return `<div style="display:grid;grid-template-columns:${isCouple?colsCouple:colsSingle}" class="review-row">
            <div class="review-cell"><span style="color:#6B645C;font-size:12px;margin-right:6px">${q.id}.</span>${q.title}${q.hw?`<span class="tag-key">key</span>`:''}${disc?`<span style="font-size:10px;background:#FAE8E5;color:#A85240;padding:1px 5px;border-radius:3px;margin-left:5px">gap</span>`:''}</div>
            <div class="review-cell center">${badge(sA)}</div>
            ${isCouple?`<div class="review-cell center">${badge(sB)}</div>`:''}
          </div>`;
        }).join('')}
      </div>
      <div style="display:grid;grid-template-columns:${isCouple?'1fr 1fr':'180px'};gap:12px;margin-bottom:28px">
        <div class="total-card">
          <div style="font-size:12px;color:#6B645C;margin-bottom:4px">${nA}</div>
          <div class="serif" style="font-size:42px;font-weight:500;color:${PC.A};line-height:1">${tA}</div>
          <div style="font-size:12px;color:#6B645C;margin-top:2px">out of 20</div>
        </div>
        ${isCouple?`<div class="total-card">
          <div style="font-size:12px;color:#6B645C;margin-bottom:4px">${nB}</div>
          <div class="serif" style="font-size:42px;font-weight:500;color:${PC.B};line-height:1">${tB}</div>
          <div style="font-size:12px;color:#6B645C;margin-top:2px">out of 20</div>
        </div>`:''}
      </div>
      <div style="display:flex;gap:12px;justify-content:flex-end">
        <button class="btn-ghost" onclick="set({screen:'questions',partner:'A',qIdx:0})">← Edit</button>
        <button class="btn-primary" onclick="analyze()">Get analysis →</button>
      </div>
    </div>`;
  }

  /* LOADING */
  else if(screen==='loading'){
    html=`<div class="screen" style="padding-top:110px;text-align:center">
      <div class="spin"></div>
      <p class="serif" style="font-size:24px;color:#6B645C;font-style:italic">Reflecting on your answers…</p>
      <p style="font-size:13px;color:#aaa;margin-top:10px">This usually takes 5–10 seconds</p>
    </div>`;
  }

  /* SAFETY */
  else if(screen==='safety'){
    html=`<div class="screen" style="padding-top:56px">
      <div style="background:#FAE8E5;border:1.5px solid #A85240;border-radius:14px;padding:30px;margin-bottom:22px">
        <div style="font-size:22px;margin-bottom:14px">⚠</div>
        <h2 class="serif" style="font-size:30px;font-weight:500;color:#1B1714;margin-bottom:14px">Safety first</h2>
        <p style="font-size:15px;line-height:1.72;color:#1B1714;margin-bottom:16px">One or more responses indicated a current pattern of fear, coercion, or sexual pressure. The most important step right now is ensuring everyone is safe and supported — not analyzing readiness.</p>
        <div style="border-top:1px solid #edc5b8;padding-top:18px">
          <div style="font-size:13px;font-weight:500;color:#1B1714;margin-bottom:10px">Resources</div>
          <ul style="list-style:none;padding:0;display:flex;flex-direction:column;gap:8px">
            <li><a href="https://www.thehotline.org" target="_blank" style="color:#A85240;font-size:14px">National Domestic Violence Hotline — thehotline.org</a></li>
            <li><a href="https://www.rainn.org" target="_blank" style="color:#A85240;font-size:14px">RAINN (sexual violence support) — rainn.org</a></li>
            <li style="font-size:14px;color:#6B645C">Contact a licensed couples therapist in your area</li>
          </ul>
        </div>
      </div>
      <button class="btn-ghost" onclick="restart()">Start over</button>
    </div>`;
  }

  /* RESULTS */
  else if(screen==='results'&&result){
    const {overview,flags,strengths,growthAreas,closing}=result;
    html=`<div class="screen" style="padding-top:44px">
      <div style="font-size:11px;letter-spacing:.12em;color:#6B645C;text-transform:uppercase;margin-bottom:10px">Analysis</div>
      <h2 class="serif" style="font-size:36px;font-weight:400;color:#1B1714;margin-bottom:22px;font-style:italic">Your relationship picture</h2>
      <div class="card" style="padding:22px 24px;margin-bottom:18px">
        <p style="font-size:15px;line-height:1.78;color:#1B1714;margin:0">${overview}</p>
      </div>
      ${flags&&flags.length?`<div class="section" style="background:#FAE8E5;border:1px solid #A85240">
        <div class="section-title" style="color:#A85240">⚠ Areas needing attention</div>
        ${flags.map((f,i)=>`<div style="${i<flags.length-1?'margin-bottom:16px':''}"><div style="font-size:13px;font-weight:500;color:#A85240;margin-bottom:4px">${f.item}</div><div style="font-size:14px;color:#1B1714;line-height:1.65">${f.concern}</div></div>`).join('')}
      </div>`:''}
      ${strengths&&strengths.length?`<div class="section" style="background:#EAF3EC;border:1px solid #3D6E50">
        <div class="section-title" style="color:#3D6E50">✓ Strengths</div>
        <ul style="list-style:none;padding:0;display:flex;flex-direction:column;gap:10px">
          ${strengths.map(s=>`<li style="display:flex;gap:10px;align-items:flex-start"><span style="color:#3D6E50;margin-top:3px;font-size:13px;flex-shrink:0">✓</span><span style="font-size:14px;line-height:1.65;color:#1B1714">${s}</span></li>`).join('')}
        </ul>
      </div>`:''}
      ${growthAreas&&growthAreas.length?`<div class="section" style="background:#FBF5E6;border:1px solid #8B6A1A">
        <div class="section-title" style="color:#7C5E1A">→ Growth areas</div>
        ${growthAreas.map((g,i)=>`<div style="${i<growthAreas.length-1?'margin-bottom:18px':''}"><div style="font-size:13px;font-weight:500;color:#7C5E1A;margin-bottom:5px">${g.area}</div><div style="font-size:14px;color:#1B1714;line-height:1.65">${g.advice}</div></div>`).join('')}
      </div>`:''}
      ${closing?`<div class="card" style="padding:20px 24px;margin-bottom:24px"><p class="serif" style="font-size:19px;line-height:1.72;color:#6B645C;font-style:italic;margin:0">"${closing}"</p></div>`:''}
      <button class="btn-ghost" onclick="restart()">Start over</button>
    </div>`;
  }

  document.getElementById('root').innerHTML=html;
}

render();
</script>
</body>
</html>
