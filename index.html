<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Foundations — Relationship Reflection</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Noto+Serif+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F7F4EF;font-family:'DM Sans',sans-serif;color:#1B1714;-webkit-font-smoothing:antialiased}
.serif{font-family:'Cormorant Garamond',Georgia,serif}
.ko .serif{font-family:'Noto Serif KR','Cormorant Garamond',serif}
.app{min-height:100vh;background:#F7F4EF}
.wrap{max-width:600px;margin:0 auto;padding:0 22px 80px}
.screen{animation:fadeIn .35s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{background:#fff;border:1px solid #DFD6CC;border-radius:12px}
.btn-primary{background:#A85240;color:#fff;border:none;border-radius:8px;padding:13px 28px;font-family:inherit;font-size:15px;font-weight:500;cursor:pointer;transition:all .15s;letter-spacing:.01em}
.btn-primary:hover:not(:disabled){background:#8D4435;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.38;cursor:not-allowed}
.btn-ghost{background:transparent;color:#6B645C;border:1.5px solid #DFD6CC;border-radius:8px;padding:11px 20px;font-family:inherit;font-size:14px;cursor:pointer;transition:all .15s}
.btn-ghost:hover:not(:disabled){border-color:#A85240;color:#A85240}
.btn-ghost:disabled{opacity:.3;cursor:not-allowed}
.lang-toggle{display:inline-flex;background:#fff;border:1.5px solid #DFD6CC;border-radius:8px;overflow:hidden}
.lang-btn{padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#6B645C;transition:all .15s;font-family:inherit}
.lang-btn.active{background:#A85240;color:#fff}
.progress-bar{height:2px;background:#DFD6CC;border-radius:2px;overflow:hidden;margin-bottom:36px}
.progress-fill{height:100%;background:#A85240;border-radius:2px;transition:width .4s ease}
.score-opt{cursor:pointer;border-radius:10px;padding:15px 18px;transition:all .15s ease;display:flex;gap:14px;align-items:flex-start;border:1.5px solid #DFD6CC;background:#fff;margin-bottom:10px}
.score-opt:hover{transform:translateY(-1px);border-color:#b5a99e}
.score-opt.sel-2{background:#EAF3EC;border-color:#3D6E50}
.score-opt.sel-1{background:#FBF5E6;border-color:#8B6A1A}
.score-opt.sel-0{background:#FAE8E5;border-color:#A85240}
.score-num{min-width:32px;height:32px;border-radius:7px;background:#E2D9D0;color:#6B645C;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:500;font-family:'Cormorant Garamond',serif;transition:all .15s;flex-shrink:0}
.sel-2 .score-num{background:#3D6E50;color:#fff}
.sel-1 .score-num{background:#8B6A1A;color:#fff}
.sel-0 .score-num{background:#A85240;color:#fff}
.score-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;color:#6B645C}
.sel-2 .score-label{color:#3D6E50}
.sel-1 .score-label{color:#7C5E1A}
.sel-0 .score-label{color:#A85240}
.score-text{font-size:14px;color:#1B1714;line-height:1.65}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.review-head{background:#EEE9E3;border-bottom:1px solid #DFD6CC}
.review-head div{padding:11px 14px;font-size:11px;font-weight:500;color:#6B645C;text-transform:uppercase;letter-spacing:.08em}
.review-row{border-bottom:1px solid #f0ebe4}
.review-row:last-child{border-bottom:none}
.review-cell{padding:13px 14px;font-size:14px;color:#1B1714;display:flex;align-items:center}
.review-cell.center{justify-content:center}
.score-badge{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;font-family:'Cormorant Garamond',serif}
.b2{background:#EAF3EC;color:#3D6E50;border:1.5px solid #3D6E50}
.b1{background:#FBF5E6;color:#7C5E1A;border:1.5px solid #8B6A1A}
.b0{background:#FAE8E5;color:#A85240;border:1.5px solid #A85240}
.section{border-radius:12px;padding:20px 24px;margin-bottom:18px}
.section-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.spin{width:36px;height:36px;border:2px solid #DFD6CC;border-top:2px solid #A85240;border-radius:50%;animation:spin 1.1s linear infinite;margin:0 auto 22px}
@keyframes spin{to{transform:rotate(360deg)}}
.tag-key{font-size:10px;background:#EEE9E3;color:#6B645C;padding:1px 5px;border-radius:3px;margin-left:6px;vertical-align:middle}
.total-card{background:#fff;border:1px solid #DFD6CC;border-radius:10px;padding:16px;text-align:center}
.partner-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:600;flex-shrink:0;letter-spacing:0}
.name-input{width:100%;padding:13px 16px;border:1.5px solid #DFD6CC;border-radius:10px;font-family:inherit;font-size:16px;color:#1B1714;background:#fff;outline:none;transition:border-color .15s}
.name-input:focus{border-color:#A85240}
.name-input::placeholder{color:#C4BAB0}
.mode-card{cursor:pointer;border:1.5px solid #DFD6CC;border-radius:12px;padding:20px 18px;background:#fff;transition:all .15s;text-align:left;width:100%}
.mode-card:hover{border-color:#A85240;transform:translateY(-1px)}
.mode-card.selected{border-color:#A85240;background:#FDF5F3}
.acc-btn{width:100%;background:#fff;border:1.5px solid #DFD6CC;border-radius:10px;cursor:pointer;padding:14px 18px;text-align:left;display:flex;justify-content:space-between;align-items:center;transition:border-color .15s;font-family:inherit}
.acc-btn:hover{border-color:#b5a99e}
.acc-btn.open{border-radius:10px 10px 0 0;border-bottom-color:transparent}
.acc-body{background:#fff;border:1.5px solid #DFD6CC;border-top:none;border-radius:0 0 10px 10px;padding:18px 20px 20px;display:none}
.acc-body.open{display:block}
.divider{height:1px;background:#EEE9E3;margin:20px 0}
.step-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.step-row:last-child{margin-bottom:0}
.step-num{min-width:22px;height:22px;border-radius:50%;background:#A85240;color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.ref-pill{display:inline-flex;align-items:center;gap:4px;background:#EEE9E3;border-radius:4px;padding:3px 8px;font-size:11px;color:#6B645C;text-decoration:none;transition:background .12s;margin:2px 3px 2px 0;line-height:1.4}
.ref-pill:hover{background:#DFD6CC;color:#1B1814}
/* Result bullet lists */
.result-item{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid rgba(0,0,0,.06)}
.result-item:last-child{border-bottom:none;padding-bottom:0}
.result-item:first-child{padding-top:0}
.result-bullet{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;margin-top:1px}
.result-item-title{font-size:13px;font-weight:600;margin-bottom:4px}
.result-item-body{font-size:14px;line-height:1.68;color:#3D3832}
</style>
</head>
<body>
<div class="app"><div class="wrap" id="root"></div></div>
<script>
const REFS={
  cdc:     {label:'CDC: Intimate Partner Violence',url:'https://www.cdc.gov/intimate-partner-violence/about/index.html'},
  lohmann: {label:'Lohmann et al., 2023',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC10666508/'},
  stanley: {label:'Stanley et al., 2010',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC3039217/'},
  owen:    {label:'Owen et al., 2013',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC3656416/'},
  johnson: {label:'Johnson et al., 2021',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC8915221/'},
  salvatore:{label:'Salvatore et al., 2011',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC3060296/'},
  ha:      {label:'Ha et al., 2013',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC3629130/'},
  haase:   {label:'Haase, 2023',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC11210602/'},
  yilmaz:  {label:'Yılmaz et al., 2023',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC10651749/'},
  dew:     {label:'Dew & Saxey, 2022',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC9722948/'},
  peetz:   {label:'Peetz et al., 2023',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC10632137/'},
  bogdan:  {label:'Bogdan et al., 2022 (meta-analysis)',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC9350520/'},
  vanderwal:{label:'van der Wal et al., 2023',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC11143760/'},
  falconier:{label:'Falconier et al., 2015 (meta-analysis)',url:'https://pubmed.ncbi.nlm.nih.gov/26295276/'},
  rusu:    {label:'Rusu et al., 2020',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC7145192/'},
  newkirk: {label:'Newkirk et al., 2017',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC5365149/'},
  aviv:    {label:'Aviv et al., 2024',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC11761833/'},
  ciciolla:{label:'Ciciolla & Luthar, 2019',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC8223758/'},
  mallory: {label:'Mallory, 2022 (meta-analysis)',url:'https://pubmed.ncbi.nlm.nih.gov/34968095/'},
  lebow:   {label:'Lebow et al., 2022',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC10087549/'},
  megale:  {label:'Megale et al., 2021',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC8127847/'},
  carroll: {label:'Carroll & Doherty, 2003',url:'https://scholarsarchive.byu.edu/facpub/4333/'},
  doss:    {label:'Doss et al., 2009',url:'https://pubmed.ncbi.nlm.nih.gov/19016573/'},
  mahoney: {label:'Mahoney et al., 2001',url:'https://pubmed.ncbi.nlm.nih.gov/10750665/'},
};

const Q=[
  {id:1,hw:true,refs:['stanley','owen'],
   en:{title:"Clear, mutual commitment",subtitle:"Choice, not inertia",
       thesis:"Readiness is stronger when commitment is a shared, deliberate decision rather than something a couple slides into. Research distinguishes dedication — an intrinsic desire to build a future together — from mere constraints that make leaving harder.",
       opts:{2:"We both clearly want this commitment and can articulate why. We are choosing it freely, not to fix major problems or relieve external pressure.",
             1:"We both lean toward commitment, but some reasons are vague, externally driven, or not fully clarified between us.",
             0:"One partner is significantly unsure, or commitment is being treated as a rescue plan, an exit from conflict, or a response to outside pressure."}},
   ko:{title:"진심으로 선택한 관계인가",subtitle:"흘러가다 보니가 아닌, 의도적 결정",
       thesis:"연구에 따르면 '함께 미래를 만들고 싶다'는 내면의 바람과, 그냥 헤어지기 어려워서 남아 있는 것은 전혀 다릅니다. 중요한 건 스스로 선택했는가입니다.",
       opts:{2:"두 사람 모두 이 관계를 원하고 왜 함께하고 싶은지 명확히 말할 수 있습니다. 문제를 해결하려거나 주변 압박 때문이 아니라, 진심으로 원해서 선택한 것입니다.",
             1:"두 사람 모두 함께하는 쪽으로 기울어 있지만, 이유가 다소 막연하거나 충분히 서로 확인되지 않은 부분이 있습니다.",
             0:"한 사람이 많이 망설이고 있거나, 이 관계가 갈등 해소나 외부 압박에 대한 반응으로 여겨지고 있습니다."}},
   detailed:[
     {refs:['stanley'],en:"I chose this relationship deliberately — not because I felt stuck, obligated, or afraid to leave.",ko:"나는 이 관계를 의도적으로 선택했습니다 — 갇혀 있거나, 의무감이나, 떠나기 두려워서가 아니라."},
     {refs:['stanley'],en:"I can clearly explain why I want to be with this person beyond surface-level reasons like attraction or comfort.",ko:"끌림이나 편안함 같은 표면적인 이유 외에, 왜 이 사람과 함께하고 싶은지 명확하게 설명할 수 있습니다."},
     {refs:['owen'],en:"My partner and I have explicitly discussed our future together — not just assumed we are on the same page.",ko:"파트너와 함께하는 미래에 대해 명확히 이야기 나눴습니다 — 그냥 같은 생각일 거라고 가정한 게 아닙니다."},
     {refs:['stanley'],en:"Neither of us is staying primarily because of practical constraints like a shared lease, finances, or social expectations.",ko:"우리 중 누구도 주로 현실적인 제약(공동 임대, 재정, 사회적 기대) 때문에 함께하는 게 아닙니다."},
     {refs:['owen'],en:"We are not in this relationship primarily to fix each other, escape a difficult period, or avoid being alone.",ko:"우리는 서로를 고치거나, 힘든 시기를 피하거나, 혼자 있기 싫어서 이 관계를 유지하는 게 아닙니다."},
     {refs:['stanley'],en:"Both of us are fully aware of the commitment we are making — no one is being rushed or pressured.",ko:"우리 둘 다 우리가 맺고 있는 관계의 의미를 충분히 알고 있습니다 — 누구도 서두르거나 강요받지 않습니다."},
     {refs:['owen'],en:"We have talked about what long-term commitment means to each of us — and our definitions are compatible.",ko:"장기적인 헌신이 각자에게 무엇을 의미하는지 이야기 나눴고, 우리의 정의가 서로 맞습니다."},
     {refs:['stanley'],en:"I feel confident this relationship is right for me — not just familiar, convenient, or the next expected step.",ko:"이 관계가 나에게 맞는다는 확신이 있습니다 — 단순히 익숙하거나, 편하거나, 다음 단계라서가 아니라."},
     {refs:['owen'],en:"External factors like family pressure, cultural expectations, or age are not the main reason we are moving forward.",ko:"외부 요인(가족 압박, 문화적 기대, 나이)이 우리가 함께 나아가는 주된 이유가 아닙니다."},
     {refs:['stanley'],en:"If I imagine our relationship 10 years from now, I can genuinely picture wanting to still be in it.",ko:"10년 후 우리의 관계를 상상할 때, 여전히 함께하고 싶다는 진심 어린 그림이 그려집니다."}
   ]},
  {id:2,hw:true,refs:['peetz','bogdan','vanderwal'],
   en:{title:"Alignment on the 'big rocks'",subtitle:"Children, finances, values, location, family, lifestyle",
       thesis:"High-stakes domains matter because they generate recurring, hard-to-compromise conflict. Financial disagreements predict later divorce; becoming parents typically lowers marital satisfaction even in good relationships; and value similarity supports both attraction and long-term functioning.",
       opts:{2:"We have discussed the major life domains and reached compatible answers or genuine, workable compromises — not just postponed decisions.",
             1:"We agree on some areas, but others are unclear, avoided, or built on idealized assumptions we haven't tested.",
             0:"There is a significant unresolved incompatibility in at least one major domain, or one or both of us avoids the conversation."}},
   ko:{title:"삶의 방향이 맞는가",subtitle:"자녀, 돈, 가치관, 거주지, 가족, 생활방식",
       thesis:"삶의 중요한 영역들이 맞지 않으면 타협하기 어려운 갈등이 반복됩니다. 돈 문제로 자주 싸우는 커플은 관계가 더 불안정하고, 아이를 낳은 뒤에는 좋은 관계도 만족도가 떨어지는 경우가 많습니다. 비슷한 가치관은 장기적 관계의 중요한 토대입니다.",
       opts:{2:"인생의 중요한 부분들을 이미 충분히 이야기했고, 방향이 맞거나 진심으로 합의할 수 있는 지점에 도달했습니다. 그냥 미뤄둔 게 아닙니다.",
             1:"일부는 맞지만, 아직 명확히 이야기 못 한 부분이 있거나, 막연하게 '어떻게 되겠지'라고 생각하는 영역이 있습니다.",
             0:"최소 하나의 중요한 영역에서 해결되지 않은 큰 차이가 있거나, 한 사람 이상이 그 대화 자체를 피하고 있습니다."}},
   detailed:[
     {refs:['doss'],en:"We have explicitly discussed whether we want children and reached a genuine agreement — not a silent hope that the other will eventually change their mind.",ko:"자녀를 원하는지에 대해 명확히 이야기 나눴고, 상대가 언젠가 마음을 바꾸길 속으로 기대하는 것이 아닌 진심으로 합의에 이르렀습니다."},
     {refs:['dew'],en:"We have discussed our core money values — spending vs. saving, risk tolerance, and financial priorities — and feel genuinely compatible.",ko:"소비 vs. 저축, 위험 감수 성향, 재정 우선순위 등 돈에 대한 핵심 가치관을 이야기 나눴고, 서로 진심으로 맞는다고 느낍니다."},
     {refs:['yilmaz','dew'],en:"We have fully disclosed debts, financial obligations, and financial history to each other — no significant financial surprises remain.",ko:"빚, 재정적 의무, 금융 이력을 서로 완전히 공개했으며, 아직 드러나지 않은 중요한 재정적 내용이 없습니다."},
     {refs:['mahoney'],en:"We are aligned not just on what we believe, but on how religion or spirituality will shape our daily home life and how we would raise children.",ko:"단순히 신념이 비슷한 것을 넘어, 종교나 영성이 일상적인 가정생활과 자녀 양육 방식에 어떤 역할을 할지에 대해서도 서로 맞닿아 있습니다."},
     {refs:['doss'],en:"If we plan to have children, we are aligned on core parenting approach — discipline style, educational priorities, and the role of extended family in raising children.",ko:"자녀를 계획한다면, 훈육 방식, 교육 우선순위, 양육에서 친인척의 역할에 대한 핵심 육아 철학이 서로 맞습니다."},
     {refs:['peetz'],en:"We are aligned on where we want to build our life long-term, and have discussed what happens if a career opportunity requires one of us to relocate.",ko:"장기적으로 어디서 살 것인지 방향이 맞고, 커리어로 인해 한 사람이 이사해야 하는 상황에 대해서도 이야기 나눴습니다."},
     {refs:['stanley'],en:"We have discussed and agree on how involved our families of origin will be — including time, emotional energy, and financial support expectations.",ko:"각자의 원가족이 우리 삶에 얼마나 관여할지를 이야기 나눴고, 시간, 정서적 에너지, 재정 지원 기대에 대해 합의했습니다."},
     {refs:['newkirk','ciciolla'],en:"We are compatible in how much of our lives we want dedicated to career versus relationship, family, and rest — neither feels held back or left behind.",ko:"커리어에 얼마나 삶을 쏟을지, 그리고 관계·가족·휴식과의 균형에 대해 서로 맞습니다. 어느 쪽도 억눌린다거나 뒤처진다는 느낌을 받지 않습니다."},
     {refs:['bogdan','vanderwal'],en:"We share enough foundational values — around fairness, gender roles, and what a good life looks like — that we feel we are building toward the same vision.",ko:"공정함, 성 역할, 좋은 삶이 무엇인지에 대한 근본적인 가치관을 충분히 공유하고 있어, 같은 방향을 향해 나아가고 있다고 느낍니다."},
     {refs:['vanderwal'],en:"Our daily lives are genuinely compatible — how we socialize, spend free time, approach health, and what a typical week looks like feels like something we both want.",ko:"교제 방식, 여가 활용, 건강에 대한 태도, 평범한 한 주의 모습 등 일상적인 삶이 진심으로 잘 맞습니다."}
   ]},
  {id:3,refs:['johnson','salvatore','ha'],
   en:{title:"Conflict skills & repair",subtitle:"How we fight and recover",
       thesis:"The issue is not whether you fight — conflict is normal — but whether it stays respectful and whether you can recover afterward. Lower negative communication consistently links to higher satisfaction, and repair ability predicts long-term stability.",
       opts:{2:"We can disagree without insults, contempt, humiliation, or character attacks. We apologize, de-escalate, and reconnect after conflict.",
             1:"We sometimes fight poorly or avoid conflict, but repair usually happens and we learn from difficult conversations.",
             0:"Conflict regularly becomes cruel, contemptuous, explosive, shut-down, or circular — with no real resolution or reconnection."}},
   ko:{title:"다툼과 화해",subtitle:"어떻게 싸우고, 어떻게 회복하는가",
       thesis:"갈등 자체는 나쁜 게 아닙니다. 중요한 건 싸울 때 서로를 존중하는지, 그리고 싸운 뒤 다시 회복할 수 있는지입니다. 회복 능력이 있는 커플이 장기적으로 더 안정적인 관계를 유지합니다.",
       opts:{2:"의견이 달라도 모욕이나 경멸, 인신공격 없이 대화할 수 있습니다. 싸우고 나면 사과하고, 감정을 가라앉히고, 관계를 회복합니다.",
             1:"때로 감정적으로 싸우거나 갈등을 피하기도 하지만, 대체로 화해가 이루어지고 어려운 대화에서 뭔가를 배웁니다.",
             0:"싸움이 자주 잔인해지거나, 경멸적이 되거나, 폭발하거나, 냉전으로 굳어버리고, 제대로 해결되지 않은 채 끝납니다."}},
   detailed:[
     {refs:['johnson'],en:"During arguments, I stay focused on the issue — I don't attack my partner's character or bring up unrelated grievances.",ko:"다툼 중에 나는 문제에 집중합니다 — 파트너의 성격을 공격하거나 관련 없는 불만을 꺼내지 않습니다."},
     {refs:['salvatore'],en:"Neither of us uses contempt — eye-rolling, mockery, or belittling — during conflict.",ko:"갈등 중에 우리 중 누구도 경멸(눈을 굴리거나, 비웃거나, 깎아내리는 것)을 사용하지 않습니다."},
     {refs:['johnson'],en:"When one of us gets overwhelmed, we can pause the conversation and return to it — rather than exploding or shutting down completely.",ko:"한쪽이 압도될 때, 대화를 잠시 멈추고 나중에 다시 돌아올 수 있습니다 — 폭발하거나 완전히 닫아버리는 대신."},
     {refs:['ha'],en:"We can both admit when we were wrong during or after a conflict.",ko:"갈등 중이나 후에 우리 둘 다 자신이 틀렸을 때 인정할 수 있습니다."},
     {refs:['salvatore'],en:"After a difficult argument, we are able to fully reconnect — there is no lingering coldness or resentment.",ko:"힘든 다툼 후에 우리는 완전히 다시 연결될 수 있습니다 — 남아 있는 냉기나 원망이 없습니다."},
     {refs:['johnson'],en:"We have a way of signaling to each other that a conversation is escalating and needs to slow down.",ko:"대화가 과열되어 속도를 늦춰야 할 때 서로에게 신호를 보내는 방법이 있습니다."},
     {refs:['salvatore'],en:"Neither of us stonewalls — goes completely silent or refuses to engage — as a regular response to conflict.",ko:"우리 중 누구도 갈등에 대한 일상적인 반응으로 냉전(완전히 침묵하거나 대화를 거부하는 것)을 사용하지 않습니다."},
     {refs:['ha'],en:"We can disagree about something without it becoming a threat to the relationship itself.",ko:"우리는 뭔가에 동의하지 않아도 그것이 관계 자체에 대한 위협이 되지 않습니다."},
     {refs:['johnson'],en:"We have repaired at least one significant conflict in a way that felt complete for both of us.",ko:"우리는 적어도 한 번의 중요한 갈등을 두 사람 모두에게 완전하게 느껴지는 방식으로 해결한 적이 있습니다."},
     {refs:['ha'],en:"Our arguments tend to end with some kind of resolution, understanding, or genuine repair — not just exhaustion.",ko:"우리의 다툼은 단순히 지쳐서 끝나는 게 아니라 어떤 해결, 이해, 또는 진정한 회복으로 끝나는 경향이 있습니다."}
   ]},
  {id:4,refs:['haase'],
   en:{title:"Emotion regulation under stress",subtitle:"Managing flooding in the moment",
       thesis:"When emotionally flooded, empathy and problem-solving both drop sharply. In couples, emotion regulation is a dyadic process — readiness means being able to pause, self-soothe, and return to conversation without causing lasting damage.",
       opts:{2:"When stressed or flooded, we can pause, self-soothe, and return to the conversation respectfully — even if it takes time.",
             1:"Stress sometimes triggers shutdown, defensiveness, or anger, but we can recover with effort and prevent lasting damage.",
             0:"Stress routinely leads to outbursts, cold withdrawal, disrespect, or ruptures we don't fully repair."}},
   ko:{title:"감정이 격해질 때",subtitle:"그 순간을 어떻게 넘기는가",
       thesis:"감정이 격해지면 공감 능력과 문제 해결 능력이 모두 떨어집니다. 둘 다 잠시 멈추고 마음을 가라앉혀 대화로 돌아올 수 있는지 — 이게 서로에게 상처를 남기지 않는 핵심입니다.",
       opts:{2:"감정이 격해지거나 스트레스를 받을 때, 잠깐 멈추고 스스로 진정한 뒤 다시 대화를 이어갈 수 있습니다.",
             1:"스트레스를 받으면 때로 말을 아예 멈추거나, 방어적이 되거나, 화를 내기도 합니다. 하지만 노력하면 회복할 수 있고, 서로에게 큰 상처를 남기지는 않습니다.",
             0:"스트레스가 쌓이면 폭발하거나, 냉담하게 벽을 쌓거나, 무례해지는 일이 반복되고, 그 상처가 제대로 아물지 않습니다."}},
   detailed:[
     {refs:['haase'],en:"I can recognize when I am becoming emotionally flooded and take steps to calm myself before responding.",ko:"내가 감정적으로 압도되고 있다는 것을 알아차리고, 반응하기 전에 스스로 진정하는 조치를 취할 수 있습니다."},
     {refs:['haase'],en:"When I am stressed, I do not take it out on my partner through irritability, criticism, or withdrawal.",ko:"스트레스를 받을 때, 짜증, 비판, 또는 거리두기를 통해 파트너에게 풀지 않습니다."},
     {refs:['haase'],en:"My partner and I can both express difficult emotions — anger, fear, sadness — without it becoming destructive.",ko:"파트너와 나 모두 힘든 감정(분노, 두려움, 슬픔)을 표현할 수 있으며, 그것이 파괴적이 되지 않습니다."},
     {refs:['haase'],en:"When I need time to calm down, I can ask for it clearly — and my partner respects that without feeling abandoned.",ko:"진정이 필요할 때, 명확하게 요청할 수 있고, 파트너는 버려진다고 느끼지 않고 그것을 존중합니다."},
     {refs:['haase'],en:"After calming down from an emotional spike, I can return to the conversation and engage productively.",ko:"감정적으로 고조된 후 진정되면, 대화로 돌아와 생산적으로 참여할 수 있습니다."},
     {refs:['haase'],en:"Neither of us uses emotional explosions — yelling, throwing things, slamming — as a pattern.",ko:"우리 중 누구도 감정 폭발(소리 지르기, 물건 던지기, 문 쾅 닫기)을 패턴으로 사용하지 않습니다."},
     {refs:['haase'],en:"I can stay emotionally regulated enough during hard conversations to actually hear what my partner is saying.",ko:"힘든 대화 중에도 감정적으로 충분히 조절하여 파트너가 말하는 것을 실제로 들을 수 있습니다."},
     {refs:['haase'],en:"Stress from outside our relationship — work, family, finances — does not routinely spill into how we treat each other.",ko:"외부 스트레스(직장, 가족, 재정)가 서로를 대하는 방식에 일상적으로 영향을 미치지 않습니다."},
     {refs:['haase'],en:"I am aware of my own emotional triggers and have shared them with my partner.",ko:"나의 감정적 촉발 요인을 알고 있으며 파트너와 공유했습니다."},
     {refs:['haase'],en:"We have a shared understanding of what each of us needs to regulate — and we support, not sabotage, each other in those moments.",ko:"각자가 감정을 조절하기 위해 필요한 것에 대한 공통된 이해가 있으며, 그 순간에 서로를 방해하지 않고 지지합니다."}
   ]},
  {id:5,hw:true,refs:['yilmaz','dew'],
   en:{title:"Trust & transparency",subtitle:"Especially money, contacts & boundaries",
       thesis:"Trust depends on predictable honesty and follow-through across all domains. It is foundational to stable relationships, and deception around finances or outside relationships is independently linked to poorer relationship functioning and lower satisfaction.",
       opts:{2:"No significant secrets. We are honest about money, boundaries, outside relationships, priorities, and loyalties. Trust feels stable and mutual.",
             1:"There are sensitive spots or past secrecy, but we are actively rebuilding trust with concrete, consistent follow-through.",
             0:"Repeated lying, hidden debt, covert contact, ongoing betrayal, or chronic suspicion is a current theme in the relationship."}},
   ko:{title:"신뢰와 솔직함",subtitle:"돈, 이성 관계, 경계선",
       thesis:"신뢰는 솔직함과 행동으로 쌓입니다. 특히 돈이나 이성 관계에 대한 거짓말은 관계 만족도를 낮추는 요인으로 관련 연구들에서 반복적으로 확인됩니다.",
       opts:{2:"중요한 비밀이 없습니다. 돈, 경계, 이성 관계, 가치 우선순위에 대해 솔직합니다. 서로를 믿는다는 느낌이 안정적입니다.",
             1:"과거에 비밀이나 거짓말로 신뢰가 약해진 적이 있지만, 구체적인 행동으로 신뢰를 다시 쌓아가는 중입니다.",
             0:"반복적인 거짓말, 숨겨진 빚, 몰래 이어진 연락, 지속적인 배신, 또는 끊이지 않는 의심이 지금 관계의 주된 문제입니다."}},
   detailed:[
     {refs:['yilmaz'],en:"I have no significant ongoing secrets from my partner about my life, finances, or outside relationships.",ko:"나의 삶, 재정, 또는 외부 관계에 대해 파트너로부터 숨기고 있는 중요한 비밀이 없습니다."},
     {refs:['dew'],en:"My partner follows through on what they say they will do — I can rely on their word.",ko:"파트너는 자신이 말한 것을 실행합니다 — 그들의 말을 믿을 수 있습니다."},
     {refs:['dew'],en:"I follow through on my own commitments consistently enough that my partner can rely on me.",ko:"나도 충분히 일관성 있게 약속을 이행하여 파트너가 나를 믿을 수 있습니다."},
     {refs:['yilmaz'],en:"There are no unresolved incidents of significant deception or betrayal that we haven't fully addressed.",ko:"충분히 다루지 않은 중요한 기만이나 배신 사건이 관계에 없습니다."},
     {refs:['yilmaz'],en:"I am honest with my partner even when the truth is uncomfortable or inconvenient.",ko:"불편하거나 어려운 경우에도 파트너에게 솔직합니다."},
     {refs:['dew'],en:"We both respect the boundaries we have agreed on regarding outside friendships and relationships.",ko:"우리 둘 다 외부 우정과 관계에 관해 합의한 경계를 존중합니다."},
     {refs:['yilmaz'],en:"I don't feel the need to check my partner's phone, messages, or whereabouts to feel secure.",ko:"안심하기 위해 파트너의 전화, 메시지, 또는 행방을 확인할 필요를 느끼지 않습니다."},
     {refs:['dew'],en:"When my partner raises a concern about trust, I take it seriously rather than dismissing or deflecting it.",ko:"파트너가 신뢰에 대한 우려를 제기할 때, 무시하거나 회피하지 않고 진지하게 받아들입니다."},
     {refs:['dew'],en:"My financial behavior — spending, debts, accounts — is fully transparent to my partner.",ko:"나의 재정적 행동(지출, 빚, 계좌)이 파트너에게 완전히 투명합니다."},
     {refs:['yilmaz'],en:"I feel genuinely safe being honest with my partner — I do not fear punishment or overreaction when I tell the truth.",ko:"파트너에게 솔직하게 말하는 것이 진심으로 안전하다고 느낍니다 — 진실을 말할 때 처벌이나 과잉반응을 두려워하지 않습니다."}
   ]},
  {id:6,refs:['falconier','rusu'],
   en:{title:"Team coping",subtitle:"Us versus the problem",
       thesis:"Couples do better when external stress becomes a shared task rather than evidence that the partner is the problem. Positive dyadic coping — especially supportive and coordinated coping — is strongly and consistently linked to relationship satisfaction.",
       opts:{2:"When life gets hard, we turn toward each other, coordinate, support, and solve together — rather than turning against each other.",
             1:"Under stress we sometimes become adversarial or withdraw, but we can reset and cooperate when we notice the pattern.",
             0:"Under stress, blame, scorekeeping, isolation, or mutual undermining becomes our default."}},
   ko:{title:"힘들 때 우리는 한 팀인가",subtitle:"문제 vs. 우리",
       thesis:"힘든 상황에서 상대를 문제로 보는 게 아니라 함께 문제를 푸는 동료가 될 때 관계가 훨씬 좋아집니다. 서로 의지하고 협력하는 커플이 관계 만족도도 높습니다.",
       opts:{2:"힘든 일이 생기면 서로를 의지하고, 함께 맞춰가며 지지하고 문제를 해결합니다.",
             1:"스트레스를 받으면 가끔 대립하거나 거리를 두기도 하지만, 패턴을 알아차리면 다시 협력해서 해결합니다.",
             0:"힘든 상황에서 비난하거나, 과거를 들먹이거나, 각자 고립되거나, 서로를 깎아내리는 것이 반복됩니다."}},
   detailed:[
     {refs:['falconier'],en:"When something stressful happens, our first instinct is to face it together rather than blaming or distancing.",ko:"스트레스가 생기면, 우리의 첫 번째 본능은 비난하거나 거리를 두는 게 아니라 함께 마주하는 것입니다."},
     {refs:['rusu'],en:"I genuinely support my partner's goals and wellbeing — even when it requires sacrifice from me.",ko:"나의 희생이 필요할 때도, 파트너의 목표와 행복을 진심으로 지지합니다."},
     {refs:['rusu'],en:"My partner genuinely supports my goals and wellbeing — I feel like they are in my corner.",ko:"파트너도 내 목표와 행복을 진심으로 지지합니다 — 그들이 내 편이라는 느낌이 있습니다."},
     {refs:['falconier'],en:"When we are under pressure, we coordinate rather than compete for resources like time, energy, and money.",ko:"압박을 받을 때, 우리는 자원(시간, 에너지, 돈)을 두고 경쟁하는 게 아니라 조율합니다."},
     {refs:['falconier'],en:"We can solve practical problems together — we divide responsibilities, communicate, and follow through.",ko:"우리는 함께 실질적인 문제를 해결할 수 있습니다 — 역할을 나누고, 소통하고, 실행합니다."},
     {refs:['rusu'],en:"Neither of us consistently makes the other feel alone during hard times.",ko:"힘든 시기에 우리 중 누구도 지속적으로 상대를 혼자라고 느끼게 하지 않습니다."},
     {refs:['rusu'],en:"I can express vulnerability — fear, sadness, uncertainty — to my partner and feel met with care, not judgment.",ko:"파트너에게 취약함(두려움, 슬픔, 불확실함)을 표현할 수 있으며, 판단이 아닌 돌봄으로 받아들여집니다."},
     {refs:['falconier'],en:"We celebrate each other's wins — neither of us consistently downplays the other's successes.",ko:"우리는 서로의 성공을 기뻐합니다 — 우리 중 누구도 상대의 성공을 지속적으로 폄하하지 않습니다."},
     {refs:['rusu'],en:"When one of us needs help, asking for it doesn't create conflict or resentment.",ko:"한쪽이 도움이 필요할 때, 도움을 요청하는 것이 갈등이나 원망을 만들지 않습니다."},
     {refs:['falconier'],en:"External stressors — financial, family, work — make us feel more united, not more divided.",ko:"외부 스트레스(재정, 가족, 직장)가 우리를 더 나누는 게 아니라 더 단결하게 만듭니다."}
   ]},
  {id:7,refs:['newkirk','aviv','ciciolla'],
   en:{title:"Fair division of labor & mental load",subtitle:"Visible and invisible work",
       thesis:"Fairness matters in both visible chores and the invisible planning work. Perceived unfairness in household labor is linked to more relationship conflict, and unequal cognitive labor is independently associated with poorer relationship functioning and worse mental health for the partner carrying it.",
       opts:{2:"Chores, admin, planning, remembering, and emotional labor feel fair enough to both of us — and we renegotiate when life changes.",
             1:"Some imbalance exists, but both partners acknowledge it and are actively working to rebalance.",
             0:"One partner consistently carries the visible or invisible load and feels unseen, resentful, or dismissed when raising it."}},
   ko:{title:"가사 노동과 정신적 노동의 공평한 분담",subtitle:"눈에 보이는 일, 눈에 보이지 않는 일",
       thesis:"집안일이 눈에 보이는 것과 보이지 않는 것을 가리지 않고 공평하게 나뉘어야 안정적인 관계를 유지할 수 있습니다. 챙기고, 기억하고, 계획하는 '보이지 않는 수고'도 포함됩니다. 이 부분에서 불공평하다고 느끼는 쪽이 관계에서 더 큰 부담을 느끼고, 정신 건강도 나빠진다는 연구가 있습니다.",
       opts:{2:"가사, 행정, 계획, 기억하기, 감정적 돌봄이 두 사람 모두에게 충분히 공평하게 느껴집니다. 상황이 바뀌면 다시 이야기해서 조정합니다.",
             1:"한쪽이 더 많이 하는 편이지만, 두 사람 모두 그 사실을 알고 있고 균형을 맞추려 노력하고 있습니다.",
             0:"한 사람이 보이는 일이든 보이지 않는 일이든 계속 혼자 짊어지고 있고, 그 얘기를 꺼내도 무시당하거나 억울함이 쌓여 있습니다."}},
   detailed:[
     {refs:['newkirk'],en:"Both of us contribute to household tasks — cooking, cleaning, errands — in a way that feels fair to both.",ko:"우리 둘 다 집안일(요리, 청소, 심부름)에 두 사람 모두에게 공평하다고 느껴지는 방식으로 기여합니다."},
     {refs:['ciciolla'],en:"The invisible mental work — remembering appointments, tracking needs, planning — is not carried primarily by one person.",ko:"보이지 않는 정신적 노동 — 약속 기억하기, 필요 파악하기, 계획하기 — 이 한 사람에게만 집중되지 않습니다."},
     {refs:['newkirk'],en:"When I raise an imbalance in our division of labor, my partner takes it seriously and works to address it.",ko:"내가 역할 분담의 불균형을 제기할 때, 파트너는 진지하게 받아들이고 해결하려 노력합니다."},

     {refs:['aviv'],en:"We have explicitly discussed how we will divide responsibilities — it is not just assumed or left to default patterns.",ko:"역할을 어떻게 나눌지 명확하게 이야기 나눴습니다 — 그냥 가정하거나 기본 패턴에 맡기지 않았습니다."},
     {refs:['ciciolla'],en:"Neither of us carries the bulk of the emotional labor — managing feelings, keeping the peace, anticipating needs.",ko:"우리 중 누구도 감정 노동의 대부분을 혼자 짊어지지 않습니다 — 상대의 감정을 관리하고, 평화를 유지하고, 필요를 예상하는 일."},
     {refs:['aviv'],en:"When life circumstances change — new job, new baby, illness — we actively renegotiate our division of labor.",ko:"삶의 상황이 바뀔 때(새 직업, 아이, 아픔), 우리는 역할 분담을 능동적으로 재조정합니다."},
     {refs:['newkirk'],en:"Neither of us uses the other's lesser contribution in one area to score points or create obligation.",ko:"우리 중 누구도 한 영역에서 상대가 덜 기여한다는 사실을 점수를 매기거나 의무를 만드는 데 사용하지 않습니다."},
     {refs:['aviv'],en:"I genuinely appreciate the contributions my partner makes — I express this, not just think it.",ko:"파트너가 기여하는 것을 진심으로 감사하게 여깁니다 — 생각만 하는 게 아니라 표현합니다."},
     {refs:['ciciolla'],en:"We agree on what clean enough and organized enough looks like — standards mismatch doesn't create ongoing friction.",ko:"'충분히 깨끗한'과 '충분히 정리된'이 어떤 모습인지에 대해 동의합니다 — 기준 불일치가 지속적인 마찰을 만들지 않습니다."}
   ]},

   detailed:[
     {refs:['lebow'],en:"I believe I can genuinely change and grow — that my relationship patterns are not fixed.",ko:"나는 진심으로 변하고 성장할 수 있다고 믿습니다 — 내 관계 패턴이 고정된 것이 아님을."},
     {refs:['carroll'],en:"When my partner gives me feedback about our relationship, I listen without becoming defensive or dismissive.",ko:"파트너가 관계에 대한 피드백을 줄 때, 방어적이 되거나 무시하지 않고 듣습니다."},
     {refs:['lebow'],en:"I take responsibility for my role in our relationship problems — I don't place all blame externally.",ko:"우리 관계 문제에서 내 역할에 대한 책임을 집니다 — 모든 것을 외부 탓으로 돌리지 않습니다."},
     {refs:['carroll'],en:"Both of us are willing to try new approaches when what we are doing is not working.",ko:"현재 하고 있는 것이 효과가 없을 때, 우리 둘 다 새로운 접근 방식을 시도할 의지가 있습니다."},
     {refs:['lebow'],en:"We would both be open to couples therapy or counseling — not just in a crisis but as a proactive tool.",ko:"우리 둘 다 커플 상담에 열려 있습니다 — 위기 때만이 아니라 선제적인 도구로서."},
     {refs:['megale'],en:"We have used at least one resource — book, podcast, course, or therapist — to intentionally improve our relationship.",ko:"관계를 의도적으로 개선하기 위해 적어도 하나의 자원(책, 팟캐스트, 강좌, 상담사)을 사용한 적이 있습니다."},
     {refs:['carroll'],en:"Neither of us treats asking for outside help as a sign of weakness or failure.",ko:"우리 중 누구도 외부 도움을 구하는 것을 약점이나 실패의 징조로 여기지 않습니다."},
     {refs:['lebow'],en:"I regularly reflect on my own behavior in the relationship — not just what my partner does wrong.",ko:"관계에서 파트너가 잘못하는 것만이 아니라, 내 자신의 행동을 정기적으로 돌아봅니다."},
     {refs:['megale'],en:"We can have honest meta-conversations — talking about how we communicate, not just what we are communicating about.",ko:"어떻게 소통하는지에 대해 — 무엇을 소통하는지뿐만 아니라 — 솔직한 메타 대화를 나눌 수 있습니다."},
     {refs:['carroll'],en:"Growth and change in ourselves individually is encouraged — not seen as a threat to the relationship.",ko:"개인적으로 성장하고 변화하는 것이 장려되며, 관계에 대한 위협으로 보이지 않습니다."}
   ]},

   detailed:[
     {refs:['mallory'],en:"We can discuss what we each want and don't want sexually — without shame, awkwardness, or conflict.",ko:"수치심, 어색함, 갈등 없이 각자 성적으로 원하는 것과 원하지 않는 것에 대해 이야기 나눌 수 있습니다."},
     {refs:['mallory'],en:"Both partners' consent is always clear, enthusiastic, and freely given — never assumed or pressured.",ko:"두 파트너의 동의는 항상 명확하고, 자발적이며, 자유롭게 주어집니다 — 가정되거나 강요되지 않습니다."},

  else set({screen:'intro'});

function hasSafetyZero(sc){return sc[9]===0;}
function hasFoundationZero(sc){return sc[0]===0||sc[1]===0||sc[4]===0;}

function scoreBand(sc){
  const tr=t();
  if(hasSafetyZero(sc)) return{label:tr.bandSafety,color:'#A85240',bg:'#FAE8E5'};
  if(hasFoundationZero(sc)) return{label:tr.bandFoundation,color:'#A85240',bg:'#FAE8E5'};
  const total=sc.reduce((a,b)=>a+(b??0),0);
  const bands=tr.scoreBands;
  if(total>=85)return bands[0];
  if(total>=65)return bands[1];
  if(total>=45)return bands[2];
  return bands[3];
}

function getDetailMode(partner,qIdx){return !!(S.detailMode[partner]&&S.detailMode[partner][qIdx]);}
function getDetailAnswers(partner,qIdx){return (S.detailAnswers[partner]&&S.detailAnswers[partner][qIdx])||Array(10).fill(null);}
function computedScores(partner){
  return Q.map((q,i)=>{
    if(getDetailMode(partner,i)&&q.detailed){
      const ans=getDetailAnswers(partner,i);
      if(ans.some(a=>a===null))return null;
      return ans.reduce((a,b)=>a+b,0);
    }
    const raw=S.scores[partner][i];
    return raw===null?null:raw*5;
  });
}
function isDomainAnswered(partner,qIdx){
  if(getDetailMode(partner,qIdx)&&Q[qIdx].detailed){
    const ans=getDetailAnswers(partner,qIdx);
    return ans.every(a=>a!==null);
  }
  return S.scores[partner][qIdx]!==null;
}

function refPills(keys){
  return keys.map(k=>{
    const r=REFS[k];
    return `<a class="ref-pill" href="${r.url}" target="_blank" rel="noopener">↗ ${r.label}</a>`;
  }).join('');
}

function buildProfile(scA,scB,isCouple,lang){
  const flags=[],strengths=[],growth=[];
  const totalA=scA.reduce((a,b)=>a+(b??0),0);
  const totalB=isCouple?scB.reduce((a,b)=>a+(b??0),0):null;
  const safetyIdx=[9],foundationIdx=[0,1,4];
  const addFlag=(idx,partner,reason)=>{
    const qEn=Q[idx].en.title,qKo=Q[idx].ko.title;
    flags.push({item:`Item ${Q[idx].id}: ${lang==='ko'?qKo:qEn}`,partner,reason});
  };
  safetyIdx.forEach(i=>{
    if(scA[i]===0)addFlag(i,'A','safety_zero');
    if(isCouple&&scB[i]===0)addFlag(i,'B','safety_zero');
  });
  foundationIdx.forEach(i=>{
    if(scA[i]===0)addFlag(i,'A','foundation_zero');
    if(isCouple&&scB[i]===0&&!flags.find(f=>f.item.startsWith(`Item ${Q[i].id}`)&&f.partner==='B'))addFlag(i,'B','foundation_zero');
  });
  Q.forEach((q,i)=>{
    if(safetyIdx.includes(i)||foundationIdx.includes(i))return;
    if(scA[i]===0&&!flags.find(f=>f.item.startsWith(`Item ${q.id}`)&&f.partner==='A'))addFlag(i,'A','zero');
    if(isCouple&&scB[i]===0&&!flags.find(f=>f.item.startsWith(`Item ${q.id}`)&&f.partner==='B'))addFlag(i,'B','zero');
  });
  if(isCouple)Q.forEach((q,i)=>{
    if(scA[i]!==null&&scB[i]!==null&&Math.abs(scA[i]-scB[i])>=5)
      flags.push({item:`Item ${q.id}: ${lang==='ko'?q.ko.title:q.en.title}`,partner:'both',reason:'discrepancy',gap:scA[i]-scB[i]});
  });
  foundationIdx.forEach(i=>{
    if(scA[i]>=4&&scA[i]<=7&&(!isCouple||scB[i]>=4&&scB[i]<=7))
      flags.push({item:`Item ${Q[i].id}: ${lang==='ko'?Q[i].ko.title:Q[i].en.title}`,partner:'both',reason:'paired_one'});
  });
  Q.forEach((q,i)=>{
    if(scA[i]>=8&&(!isCouple||scB[i]>=8))
      strengths.push({item:`Item ${q.id}`,title:lang==='ko'?q.ko.title:q.en.title});
  });
  Q.forEach((q,i)=>{
    const aScore=scA[i],bScore=isCouple?scB[i]:null;
    if((aScore>=4&&aScore<=7)||(isCouple&&bScore>=4&&bScore<=7)){
      if(!flags.find(f=>f.item.startsWith(`Item ${q.id}`)))
        growth.push({item:`Item ${q.id}`,title:lang==='ko'?q.ko.title:q.en.title,priority:q.hw?1:0});
    }
  });
  growth.sort((a,b)=>b.priority-a.priority);
  return{flags,strengths:strengths.slice(0,4),growth:growth.slice(0,4),totalA,totalB};
}

async function analyze(){
  set({screen:'loading',loading:true,error:null});
  const nA=nOf('A'),nB=nOf('B');
  const isCouple=S.mode==='couple';
  const safetyA=hasSafetyZero(computedScores('A'));
  const safetyB=isCouple&&hasSafetyZero(computedScores('B'));
  const hasSafety=safetyA||safetyB;
  const tr=t();
  const langInst=tr.promptInstruction;
  const csA=computedScores('A'),csB=computedScores('B');
  const profile=buildProfile(csA,csB,isCouple,S.lang);

  // Build rich per-domain detail for each partner
  const buildDomainDetail=(partner,cs)=>Q.map((q,i)=>{
    const score=cs[i];
    const ql=q[S.lang];
    const isDetailedDomain=getDetailMode(partner,i)&&q.detailed;
    const entry={domain:`Item ${q.id}: ${ql.title}`,score:`${score??'—'}/10`};
    if(isDetailedDomain){
      const ans=getDetailAnswers(partner,i);
      const nos=q.detailed.map((sq,si)=>ans[si]===0?sq[S.lang]:null).filter(Boolean);
      const yeses=q.detailed.map((sq,si)=>ans[si]===1?sq[S.lang]:null).filter(Boolean);
      if(nos.length)entry.unresolved=nos;
      if(yeses.length)entry.confirmed=yeses;
    } else if(score!==null){
      const rawScore=S.scores[partner][i];
      if(rawScore!==null&&ql.opts)entry.selectedAnswer=ql.opts[rawScore];
    }
    return entry;
  });

  const profileJson=JSON.stringify({
    partnerA:nA,partnerB:isCouple?nB:null,mode:S.mode,
    totalA:profile.totalA,totalB:profile.totalB,
    hasSafetyConcern:hasSafety,
    domainsA:buildDomainDetail('A',csA),
    ...(isCouple?{domainsB:buildDomainDetail('B',csB)}:{}),
  });
  const prompt=`${tr.promptRole}${langInst?' '+langInst:''}

A ${isCouple?'couple':'person'} completed a science-based relationship readiness assessment.

RESPONSE DATA (scores out of 10, plus exact answers selected):
${profileJson}

YOUR TASK: Write personalised feedback. Each flag and growth area MUST include an "actions" array — a list of SHORT, SPECIFIC, DOABLE bullet points. Do NOT write long paragraphs in "concern" or "context". Keep those to 1 sentence max. Put all the substance in "actions".

GOOD example of an actions array:
"actions": [
  "Book a 1-hour conversation this week to discuss whether you both want children — decide on a date before leaving this app",
  "Each write down your top 3 financial priorities independently, then compare lists side by side",
  "Agree on a 20-minute cool-down rule: either partner can call a pause mid-argument, no questions asked"
]

BAD example (do NOT do this):
"actions": []  ← never leave empty
"context": "You need to have many conversations about various topics and work on communication and trust and also consider therapy." ← too vague, no bullets

RULES:
- actions: 2–4 bullets per flag/growth area, each starting with a verb, each ≤ 25 words
- For Big Rocks "unresolved" items: write one bullet per unresolved topic naming it explicitly

{"overview":"2-3 sentences, use names, reference actual scores","flags":[{"item":"domain name","concern":"1 sentence max","actions":["verb-led specific action","verb-led specific action"]}],"strengths":[{"title":"domain name","detail":"1-2 sentences using names and what they said"}],"growthAreas":[{"area":"domain name","context":"1 sentence max on what needs work","actions":["verb-led specific action","verb-led specific action","verb-led specific action"]}]}

${langInst}`;

  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:3200,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    if(data.error)throw new Error(typeof data.error==='object'?data.error.message:data.error);
    const txt=data.content?.map(b=>b.text||'').join('')||'';
    let parsed;
    try{parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());}
    catch{parsed={overview:txt.slice(0,300),flags:[],strengths:[],growthAreas:[]};}
    const safe={
      overview:typeof parsed.overview==='string'?parsed.overview:'',
      flags:Array.isArray(parsed.flags)?parsed.flags.filter(f=>f&&typeof f.item==='string')
        .map(f=>({item:f.item,concern:f.concern||'',actions:Array.isArray(f.actions)?f.actions.filter(a=>typeof a==='string'):[]})):[],
      strengths:Array.isArray(parsed.strengths)?parsed.strengths.filter(s=>s&&(typeof s==='string'||typeof s.title==='string'))
        .map(s=>typeof s==='string'?{title:'',detail:s}:{title:s.title||'',detail:s.detail||''}):[],

        .map(g=>({area:g.area,context:g.context||g.advice||'',actions:Array.isArray(g.actions)?g.actions.filter(a=>typeof a==='string'):[]})):[],
    };

      <div class="spin"></div>
      <p class="serif" style="font-size:24px;color:#6B645C;font-style:italic">${tr.loadingText}</p>
      <p style="font-size:13px;color:#aaa;margin-top:10px">${tr.loadingNote}</p>
    </div>`;
  }

  else if(screen==='results'&&result){
    const {overview,flags,strengths,growthAreas}=result;
    const csA=computedScores('A'),csB=computedScores('B');
    const tA=csA.reduce((a,b)=>a+(b??0),0);
    const tB=csB.reduce((a,b)=>a+(b??0),0);
    const bandA=scoreBand(csA);
    const bandB=isCouple?scoreBand(csB):null;
    html=`<div class="screen ${tr.langClass}" style="padding-top:44px">
      <div style="font-size:11px;letter-spacing:.12em;color:#6B645C;text-transform:uppercase;margin-bottom:10px">${tr.analysisTag}</div>
      <h2 class="serif" style="font-size:36px;font-weight:400;color:#1B1714;margin-bottom:22px;font-style:italic">${tr.analysisTitle}</h2>

      <!-- Score cards -->
      <div style="display:grid;grid-template-columns:${isCouple?'1fr 1fr':'1fr'};gap:10px;margin-bottom:22px">
        <div style="background:${bandA.bg};border-radius:10px;padding:14px 16px;text-align:center">
          <div style="font-size:12px;color:#6B645C;margin-bottom:4px">${esc(nOf('A'))}</div>
          <div class="serif" style="font-size:38px;font-weight:500;color:${bandA.color};line-height:1;margin-bottom:5px">${tA}<span style="font-size:18px;color:#aaa"> / 100</span></div>
          <div style="font-size:12px;color:${bandA.color}">${esc(bandA.label)}</div>
        </div>
        ${isCouple&&bandB?`<div style="background:${bandB.bg};border-radius:10px;padding:14px 16px;text-align:center">
          <div style="font-size:12px;color:#6B645C;margin-bottom:4px">${esc(nOf('B'))}</div>
          <div class="serif" style="font-size:38px;font-weight:500;color:${bandB.color};line-height:1;margin-bottom:5px">${tB}<span style="font-size:18px;color:#aaa"> / 100</span></div>
          <div style="font-size:12px;color:${bandB.color}">${esc(bandB.label)}</div>
        </div>`:''}
      </div>

      <!-- Safety resources -->
      ${S.hasSafety?`<div style="background:#FAE8E5;border:1.5px solid #A85240;border-radius:12px;padding:20px 22px;margin-bottom:18px">
        <div style="font-size:12px;font-weight:600;color:#A85240;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">${tr.supportTitle}</div>
        <p style="font-size:14px;color:#7A3428;line-height:1.68;margin-bottom:14px">${tr.supportBody}</p>
        <ul style="list-style:none;padding:0;display:flex;flex-direction:column;gap:7px">
          <li><a href="https://www.thehotline.org" target="_blank" style="color:#A85240;font-size:14px">${tr.hotline}</a></li>
          <li><a href="https://www.rainn.org" target="_blank" style="color:#A85240;font-size:14px">${tr.rainn}</a></li>
          <li style="font-size:14px;color:#6B645C">${tr.therapist}</li>
        </ul>
      </div>`:''}

      <!-- Overview -->
      <div style="background:#fff;border:1px solid #DFD6CC;border-radius:12px;padding:20px 22px;margin-bottom:18px">
        <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#6B645C;margin-bottom:10px">${tr.overviewLabel}</div>
        <p style="font-size:15px;line-height:1.78;color:#1B1714;margin:0">${esc(overview)}</p>
      </div>

      <!-- Flags -->
      ${flags&&flags.length?`<div class="section" style="background:#FAE8E5;border:1px solid #c87060">
        <div class="section-title" style="color:#A85240"><span>⚠</span>${tr.flagsTitle}</div>
        ${flags.map(f=>`<div class="result-item">
          <div class="result-bullet" style="background:#FAD4CD;color:#A85240">!</div>
          <div style="flex:1">
            <div class="result-item-title" style="color:#A85240">${esc(f.item)}</div>
            ${f.concern?`<div class="result-item-body" style="margin-bottom:${f.actions&&f.actions.length?'10px':'0'}">${esc(f.concern)}</div>`:''}
            ${f.actions&&f.actions.length?`<ul style="margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:6px">
              ${f.actions.map(a=>`<li style="display:flex;gap:8px;align-items:flex-start"><span style="color:#A85240;font-weight:600;flex-shrink:0;margin-top:1px">→</span><span style="font-size:13px;color:#7A3428;line-height:1.6">${esc(a)}</span></li>`).join('')}
            </ul>`:''}
          </div>
        </div>`).join('')}
      </div>`:''}

      <!-- Strengths -->
      ${strengths&&strengths.length?`<div class="section" style="background:#EAF3EC;border:1px solid #7ab98a">
        <div class="section-title" style="color:#3D6E50"><span>✓</span>${tr.strengthsTitle}</div>
        ${strengths.map(s=>`<div class="result-item">
          <div class="result-bullet" style="background:#C4E2CB;color:#3D6E50">✓</div>
          <div>
            ${s.title?`<div class="result-item-title" style="color:#3D6E50">${esc(s.title)}</div>`:''}
            <div class="result-item-body" style="padding-top:${s.title?'2px':'0'}">${esc(s.detail)}</div>
          </div>
        </div>`).join('')}
      </div>`:''}

      <!-- Growth areas -->
      ${growthAreas&&growthAreas.length?`<div class="section" style="background:#FBF5E6;border:1px solid #c9a85c">
        <div class="section-title" style="color:#7C5E1A"><span>→</span>${tr.growthTitle}</div>
        ${growthAreas.map(g=>`<div class="result-item">
          <div class="result-bullet" style="background:#F0DCA8;color:#7C5E1A">→</div>
          <div style="flex:1">
            <div class="result-item-title" style="color:#7C5E1A">${esc(g.area)}</div>
            ${g.context?`<div class="result-item-body" style="margin-bottom:${g.actions&&g.actions.length?'10px':'0'}">${esc(g.context)}</div>`:''}
            ${g.actions&&g.actions.length?`<ul style="margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:6px">
              ${g.actions.map(a=>`<li style="display:flex;gap:8px;align-items:flex-start"><span style="color:#8B6A1A;font-weight:600;flex-shrink:0;margin-top:1px">→</span><span style="font-size:13px;color:#5C4010;line-height:1.6">${esc(a)}</span></li>`).join('')}
            </ul>`:''}
          </div>
        </div>`).join('')}
      </div>`:''}

      <p style="font-size:11px;color:#aaa;line-height:1.55;margin-bottom:16px;padding:0 2px">${tr.disclaimerNote}</p>
      <p style="font-size:13px;color:#6B645C;text-align:center;margin-bottom:24px">${lang==='ko'?'이 도구에 대한 의견이 있으신가요?':'Thoughts on this tool?'} <a href="mailto:kriskim8937@gmail.com?subject=${encodeURIComponent(lang==='ko'?'Foundations 피드백':'Foundations feedback')}" style="color:#A85240;text-decoration:underline">${lang==='ko'?'의견 보내기':'Send us a note'}</a></p>
      <div style="display:flex;gap:12px;justify-content:space-between">
        <button class="btn-ghost" onclick="set({screen:'review'})">${lang==='ko'?'← 답변 다시 보기':'← Back to answers'}</button>
        <button class="btn-ghost" onclick="restart()">${tr.restartBtn}</button>
      </div>
    </div>`;
  }

  document.getElementById('root').innerHTML=html;
}

function restart(){
  set({screen:'intro',mode:null,names:{A:'',B:''},scores:{A:Array(10).fill(null),B:Array(10).fill(null)},detailMode:{A:{},B:{}},detailAnswers:{A:{},B:{}},partner:'A',qIdx:0,result:null,loading:false,error:null,hasSafety:false});
}

render();
</script>
</body>
</html>
