<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Foundations — Relationship Readiness Reflection</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Noto+Serif+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F7F4EF;font-family:'DM Sans',sans-serif;color:#1B1714;-webkit-font-smoothing:antialiased}
.serif{font-family:'Cormorant Garamond',Georgia,serif}
.ko .serif{font-family:'Noto Serif KR','Cormorant Garamond',serif}
.app{min-height:100vh;background:#F7F4EF}
.wrap{max-width:600px;margin:0 auto;padding:0 22px 80px}
.screen{animation:fadeIn .35s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{background:#fff;border:1px solid #DFD6CC;border-radius:12px}
.btn-primary{background:#A85240;color:#fff;border:none;border-radius:8px;padding:13px 28px;font-family:inherit;font-size:15px;font-weight:500;cursor:pointer;transition:all .15s;letter-spacing:.01em}
.btn-primary:hover:not(:disabled){background:#8D4435;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.38;cursor:not-allowed}
.btn-ghost{background:transparent;color:#6B645C;border:1.5px solid #DFD6CC;border-radius:8px;padding:11px 20px;font-family:inherit;font-size:14px;cursor:pointer;transition:all .15s}
.btn-ghost:hover:not(:disabled){border-color:#A85240;color:#A85240}
.btn-ghost:disabled{opacity:.3;cursor:not-allowed}
.lang-toggle{position:fixed;top:16px;right:16px;z-index:100;display:flex;background:#fff;border:1.5px solid #DFD6CC;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.lang-btn{padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#6B645C;transition:all .15s;font-family:inherit}
.lang-btn.active{background:#A85240;color:#fff}
.progress-bar{height:2px;background:#DFD6CC;border-radius:2px;overflow:hidden;margin-bottom:36px}
.progress-fill{height:100%;background:#A85240;border-radius:2px;transition:width .4s ease}
.score-opt{cursor:pointer;border-radius:10px;padding:15px 18px;transition:all .15s ease;display:flex;gap:14px;align-items:flex-start;border:1.5px solid #DFD6CC;background:#fff;margin-bottom:10px}
.score-opt:hover{transform:translateY(-1px);border-color:#b5a99e}
.score-opt.sel-2{background:#EAF3EC;border-color:#3D6E50}
.score-opt.sel-1{background:#FBF5E6;border-color:#8B6A1A}
.score-opt.sel-0{background:#FAE8E5;border-color:#A85240}
.score-num{min-width:32px;height:32px;border-radius:7px;background:#E2D9D0;color:#6B645C;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:500;font-family:'Cormorant Garamond',serif;transition:all .15s;flex-shrink:0}
.sel-2 .score-num{background:#3D6E50;color:#fff}
.sel-1 .score-num{background:#8B6A1A;color:#fff}
.sel-0 .score-num{background:#A85240;color:#fff}
.score-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;color:#6B645C}
.sel-2 .score-label{color:#3D6E50}
.sel-1 .score-label{color:#7C5E1A}
.sel-0 .score-label{color:#A85240}
.score-text{font-size:14px;color:#1B1714;line-height:1.65}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.review-head{background:#EEE9E3;border-bottom:1px solid #DFD6CC}
.review-head div{padding:11px 14px;font-size:11px;font-weight:500;color:#6B645C;text-transform:uppercase;letter-spacing:.08em}
.review-row{border-bottom:1px solid #f0ebe4}
.review-row:last-child{border-bottom:none}
.review-cell{padding:13px 14px;font-size:14px;color:#1B1714;display:flex;align-items:center}
.review-cell.center{justify-content:center}
.score-badge{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;font-family:'Cormorant Garamond',serif}
.b2{background:#EAF3EC;color:#3D6E50;border:1.5px solid #3D6E50}
.b1{background:#FBF5E6;color:#7C5E1A;border:1.5px solid #8B6A1A}
.b0{background:#FAE8E5;color:#A85240;border:1.5px solid #A85240}
.section{border-radius:12px;padding:20px 24px;margin-bottom:18px}
.section-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.spin{width:36px;height:36px;border:2px solid #DFD6CC;border-top:2px solid #A85240;border-radius:50%;animation:spin 1.1s linear infinite;margin:0 auto 22px}
@keyframes spin{to{transform:rotate(360deg)}}
.tag-key{font-size:10px;background:#EEE9E3;color:#6B645C;padding:1px 5px;border-radius:3px;margin-left:6px;vertical-align:middle}
.total-card{background:#fff;border:1px solid #DFD6CC;border-radius:10px;padding:16px;text-align:center}
.partner-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:600;flex-shrink:0;letter-spacing:0}
.name-input{width:100%;padding:13px 16px;border:1.5px solid #DFD6CC;border-radius:10px;font-family:inherit;font-size:16px;color:#1B1714;background:#fff;outline:none;transition:border-color .15s}
.name-input:focus{border-color:#A85240}
.name-input::placeholder{color:#C4BAB0}
.mode-card{cursor:pointer;border:1.5px solid #DFD6CC;border-radius:12px;padding:20px 18px;background:#fff;transition:all .15s;text-align:left;width:100%}
.mode-card:hover{border-color:#A85240;transform:translateY(-1px)}
.mode-card.selected{border-color:#A85240;background:#FDF5F3}
.acc-btn{width:100%;background:#fff;border:1.5px solid #DFD6CC;border-radius:10px;cursor:pointer;padding:14px 18px;text-align:left;display:flex;justify-content:space-between;align-items:center;transition:border-color .15s;font-family:inherit}
.acc-btn:hover{border-color:#b5a99e}
.acc-btn.open{border-radius:10px 10px 0 0;border-bottom-color:transparent}
.acc-body{background:#fff;border:1.5px solid #DFD6CC;border-top:none;border-radius:0 0 10px 10px;padding:18px 20px 20px;display:none}
.acc-body.open{display:block}
.divider{height:1px;background:#EEE9E3;margin:20px 0}
.step-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.step-row:last-child{margin-bottom:0}
.step-num{min-width:22px;height:22px;border-radius:50%;background:#A85240;color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.ref-pill{display:inline-flex;align-items:center;gap:4px;background:#EEE9E3;border-radius:4px;padding:3px 8px;font-size:11px;color:#6B645C;text-decoration:none;transition:background .12s;margin:2px 3px 2px 0;line-height:1.4}
.ref-pill:hover{background:#DFD6CC;color:#1B1714}
</style>
</head>

<div class="lang-toggle">
  <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
  <button class="lang-btn" id="btn-ko" onclick="setLang('ko')">한국어</button>
</div>
<div class="app"><div class="wrap" id="root"></div></div>
<script>
/* ── REFERENCES ── */
const REFS={
  cdc:     {label:'CDC: Intimate Partner Violence',url:'https://www.cdc.gov/intimate-partner-violence/about/index.html'},
  lohmann: {label:'Lohmann et al., 2023',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC10666508/'},
  stanley: {label:'Stanley et al., 2010',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC3039217/'},
  owen:    {label:'Owen et al., 2013',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC3656416/'},
  johnson: {label:'Johnson et al., 2021',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC8915221/'},
  salvatore:{label:'Salvatore et al., 2011',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC3060296/'},
  ha:      {label:'Ha et al., 2013',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC3629130/'},
  haase:   {label:'Haase, 2023',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC11210602/'},
  yilmaz:  {label:'Yılmaz et al., 2023',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC10651749/'},
  dew:     {label:'Dew & Saxey, 2022',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC9722948/'},
  peetz:   {label:'Peetz et al., 2023',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC10632137/'},
  bogdan:  {label:'Bogdan et al., 2022 (meta-analysis)',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC9350520/'},
  vanderwal:{label:'van der Wal et al., 2023',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC11143760/'},
  falconier:{label:'Falconier et al., 2015 (meta-analysis)',url:'https://pubmed.ncbi.nlm.nih.gov/26295276/'},
  rusu:    {label:'Rusu et al., 2020',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC7145192/'},
  newkirk: {label:'Newkirk et al., 2017',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC5365149/'},
  aviv:    {label:'Aviv et al., 2024',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC11761833/'},
  ciciolla:{label:'Ciciolla & Luthar, 2019',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC8223758/'},
  mallory: {label:'Mallory, 2022 (meta-analysis)',url:'https://pubmed.ncbi.nlm.nih.gov/34968095/'},
  lebow:   {label:'Lebow et al., 2022',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC10087549/'},
  megale:  {label:'Megale et al., 2021',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC8127847/'},
  carroll: {label:'Carroll & Doherty, 2003',url:'https://scholarsarchive.byu.edu/facpub/4333/'},
};

/* ── QUESTIONS (bilingual) ── */
const Q=[
  {id:1,gate:true,hw:true,refs:['cdc','lohmann'],
   en:{title:"Safety, respect & autonomy",subtitle:"Non-negotiable",
       thesis:"Readiness begins with safety. Intimate partner violence includes psychological aggression, coercive control, stalking, sexual coercion, and physical violence — all associated with PTSD, depression, and long-term trauma.",
       opts:{2:"We consistently treat each other with respect. No intimidation, threats, coercion, surveillance, sexual pressure, or physical aggression. Boundaries and 'no' are always honored.",
             1:"Mostly respectful, with occasional hurtful escalations or boundary slips that are acknowledged, repaired, and becoming less frequent.",
             0:"Any current pattern of fear, control, threats, sexual pressure, physical aggression, or coercion — regardless of how infrequent."}},
   ko:{title:"안전, 존중 & 자율성",subtitle:"필수 항목 (비협상적)",
       thesis:"관계 준비도는 안전에서 시작됩니다. 친밀한 파트너 폭력에는 심리적 공격, 강압적 통제, 스토킹, 성적 강압, 신체적 폭력이 포함되며, 이 모든 것은 외상 후 스트레스 장애, 우울증, 장기적 트라우마와 관련이 있습니다.",
       opts:{2:"서로를 지속적으로 존중합니다. 협박, 위협, 강압, 감시, 성적 압박, 신체적 공격이 없습니다. 경계와 '싫다'는 말은 항상 존중됩니다.",
             1:"대체로 존중하지만, 가끔 상처를 주거나 경계를 넘는 경우가 있으며, 이를 인정하고 회복하며 점차 줄어들고 있습니다.",
             0:"두려움, 통제, 위협, 성적 압박, 신체적 공격, 강압의 패턴이 현재 나타나고 있습니다 — 빈도에 관계없이."}}},
  {id:2,hw:true,refs:['stanley','owen'],
   en:{title:"Clear, mutual commitment",subtitle:"Choice, not inertia",
       thesis:"Readiness is stronger when commitment is a shared, deliberate decision rather than something a couple slides into. Research distinguishes dedication — an intrinsic desire to build a future together — from mere constraints that make leaving harder.",
       opts:{2:"We both clearly want this commitment and can articulate why. We are choosing it freely, not to fix major problems or relieve external pressure.",
             1:"We both lean toward commitment, but some reasons are vague, externally driven, or not fully clarified between us.",
             0:"One partner is significantly unsure, or commitment is being treated as a rescue plan, an exit from conflict, or a response to outside pressure."}},
   ko:{title:"명확하고 상호적인 헌신",subtitle:"선택, 관성이 아닌",
       thesis:"헌신은 '그냥 흘러가는 대로' 맡기는 것이 아니라 의도적인 공동 결정을 내릴 때 더 강해집니다. 연구에 따르면 헌신은 함께 미래를 만들고자 하는 내재적 열망과, 떠나기 어렵게 만드는 제약 조건을 구별합니다.",
       opts:{2:"두 분 모두 이 헌신을 원하며 그 이유를 명확하게 말할 수 있습니다. 큰 문제를 해결하거나 외부 압박을 해소하기 위해서가 아니라 자유롭게 선택한 것입니다.",
             1:"두 분 모두 헌신 쪽으로 기울어 있지만, 일부 이유가 모호하거나 외부적 요인에 의한 것이거나 충분히 명확하지 않습니다.",
             0:"한 파트너가 크게 확신하지 못하거나, 헌신이 문제 해결책, 갈등 탈출구, 또는 외부 압력에 대한 반응으로 다루어지고 있습니다."}}},
  {id:3,refs:['johnson','salvatore','ha'],
   en:{title:"Conflict skills & repair",subtitle:"How we fight and recover",
       thesis:"The issue is not whether you fight — conflict is normal — but whether it stays respectful and whether you can recover afterward. Lower negative communication consistently links to higher satisfaction, and repair ability predicts long-term stability.",
       opts:{2:"We can disagree without insults, contempt, humiliation, or character attacks. We apologize, de-escalate, and reconnect after conflict.",
             1:"We sometimes fight poorly or avoid conflict, but repair usually happens and we learn from difficult conversations.",
             0:"Conflict regularly becomes cruel, contemptuous, explosive, shut-down, or circular — with no real resolution or reconnection."}},
   ko:{title:"갈등 해결 & 관계 회복",subtitle:"싸우는 방식과 회복하는 방식",
       thesis:"중요한 것은 싸우느냐 아니냐가 아닙니다 — 갈등은 정상입니다. 갈등이 존중을 유지하는지, 그리고 이후에 회복할 수 있는지가 핵심입니다. 부정적인 소통이 낮을수록 만족도가 높고, 갈등 후 회복 능력이 장기적 안정성을 예측합니다.",
       opts:{2:"모욕, 경멸, 굴욕, 인격 공격 없이 의견 불일치를 나눌 수 있습니다. 갈등 후 사과하고, 흥분을 가라앉히며, 다시 연결됩니다.",
             1:"때로 잘못 싸우거나 갈등을 회피하지만, 대체로 회복이 이루어지며 어려운 대화에서 배움을 얻습니다.",
             0:"갈등이 잔인하거나, 경멸적이거나, 폭발적이거나, 단절되거나, 순환적으로 변하며 진정한 해결이나 재연결 없이 끝납니다."}}},
  {id:4,refs:['haase'],
   en:{title:"Emotion regulation under stress",subtitle:"Managing flooding in the moment",
       thesis:"When emotionally flooded, empathy and problem-solving both drop sharply. In couples, emotion regulation is a dyadic process — readiness means being able to pause, self-soothe, and return to conversation without causing lasting damage.",
       opts:{2:"When stressed or flooded, we can pause, self-soothe, and return to the conversation respectfully — even if it takes time.",
             1:"Stress sometimes triggers shutdown, defensiveness, or anger, but we can recover with effort and prevent lasting damage.",
             0:"Stress routinely leads to outbursts, cold withdrawal, disrespect, or ruptures we don't fully repair."}},
   ko:{title:"스트레스 상황에서의 감정 조절",subtitle:"그 순간의 감정 관리",
       thesis:"감정적으로 압도될 때 공감 능력과 문제 해결 능력이 모두 현저히 저하됩니다. 커플 관계에서 감정 조절은 쌍방향 과정으로, 준비도는 영구적인 손상 없이 잠시 멈추고, 스스로를 진정시키며, 대화로 돌아올 수 있음을 의미합니다.",
       opts:{2:"스트레스를 받거나 압도될 때, 잠시 멈추고 스스로 진정한 후 존중하는 방식으로 대화로 돌아올 수 있습니다 — 시간이 걸리더라도요.",
             1:"스트레스가 때로 단절, 방어적 태도, 화를 유발하지만, 노력하면 회복하고 영구적인 손상을 방지할 수 있습니다.",
             0:"스트레스가 습관적으로 폭발, 냉담한 회피, 무례함, 또는 완전히 해결되지 않는 단절로 이어집니다."}}},
  {id:5,hw:true,refs:['yilmaz','dew'],
   en:{title:"Trust & transparency",subtitle:"Especially money, contacts & boundaries",
       thesis:"Trust depends on predictable honesty and follow-through across all domains. It is foundational to stable relationships, and deception around finances or outside relationships is independently linked to poorer relationship functioning and lower satisfaction.",
       opts:{2:"No significant secrets. We are honest about money, boundaries, outside relationships, priorities, and loyalties. Trust feels stable and mutual.",
             1:"There are sensitive spots or past secrecy, but we are actively rebuilding trust with concrete, consistent follow-through.",
             0:"Repeated lying, hidden debt, covert contact, ongoing betrayal, or chronic suspicion is a current theme in the relationship."}},
   ko:{title:"신뢰 & 투명성",subtitle:"특히 돈, 연락처 & 경계",
       thesis:"신뢰는 모든 영역에서 예측 가능한 정직함과 약속 이행에 달려 있습니다. 신뢰는 안정적인 관계의 근본이며, 재정이나 외부 관계에 대한 기만은 독립적으로 더 나쁜 관계 기능과 낮은 만족도와 연결됩니다.",
       opts:{2:"중요한 비밀이 없습니다. 돈, 경계, 외부 관계, 우선순위, 충성심에 대해 솔직합니다. 신뢰가 안정적이고 상호적으로 느껴집니다.",
             1:"민감한 부분이나 과거의 비밀이 있지만, 구체적이고 일관된 후속 행동으로 신뢰를 적극적으로 회복하고 있습니다.",
             0:"반복적인 거짓말, 숨겨진 빚, 은밀한 연락, 지속적인 배신, 또는 만성적인 의심이 현재 관계의 주제입니다."}}},
  {id:6,hw:true,refs:['peetz','bogdan','vanderwal'],
   en:{title:"Alignment on the 'big rocks'",subtitle:"Children, finances, values, location, family, lifestyle",
       thesis:"High-stakes domains matter because they generate recurring, hard-to-compromise conflict. Financial disagreements predict later divorce; becoming parents typically lowers marital satisfaction even in good relationships; and value similarity supports both attraction and long-term functioning.",
       opts:{2:"We have discussed the major life domains and reached compatible answers or genuine, workable compromises — not just postponed decisions.",
             1:"We agree on some areas, but others are unclear, avoided, or built on idealized assumptions we haven't tested.",
             0:"There is a significant unresolved incompatibility in at least one major domain, or one or both of us avoids the conversation."}},
   ko:{title:"핵심 가치관 일치",subtitle:"자녀, 재정, 가치관, 거주지, 가족, 생활방식",
       thesis:"중요한 영역들은 타협하기 어려운 반복적인 갈등을 만들어내기 때문에 중요합니다. 재정적 의견 불일치는 이후 이혼을 예측하고, 부모가 되는 전환은 좋은 관계에서도 결혼 만족도를 낮추며, 가치관의 유사성은 매력과 장기적 기능을 지원합니다.",
       opts:{2:"주요 삶의 영역들을 논의했고 양립 가능한 답변이나 진정하고 실행 가능한 타협안에 도달했습니다 — 결정을 미룬 것이 아닙니다.",
             1:"일부 영역에 동의하지만, 다른 영역은 불명확하거나 회피되거나 테스트되지 않은 이상적인 가정에 기반합니다.",
             0:"최소 하나의 주요 영역에서 해결되지 않은 중요한 불일치가 있거나, 한 명 이상이 대화를 회피합니다."}}},
  {id:7,refs:['falconier','rusu'],
   en:{title:"Team coping",subtitle:"Us versus the problem",
       thesis:"Couples do better when external stress becomes a shared task rather than evidence that the partner is the problem. Positive dyadic coping — especially supportive and coordinated coping — is strongly and consistently linked to relationship satisfaction.",
       opts:{2:"When life gets hard, we turn toward each other, coordinate, support, and solve together — rather than turning against each other.",

             0:"Under stress, blame, scorekeeping, isolation, or mutual undermining becomes our default."}},
   ko:{title:"팀으로서의 대처",subtitle:"문제 vs. 우리",
       thesis:"외부 스트레스가 파트너가 문제라는 증거가 아니라 공동 과제가 될 때 커플은 더 잘 지냅니다. 긍정적인 이인 대처 — 특히 지지적이고 협력적인 대처 — 는 관계 만족도와 강하고 일관되게 연결됩니다.",
       opts:{2:"힘든 일이 생기면 서로를 향해 돌아서고, 조율하고, 지지하며, 함께 해결합니다 — 서로에게 등 돌리는 것이 아니라요.",
             1:"스트레스 상황에서 때로 대립하거나 후퇴하지만, 패턴을 인식하면 재설정하고 협력할 수 있습니다.",
             0:"스트레스 상황에서 비난, 점수 매기기, 고립, 또는 상호 훼손이 기본값이 됩니다."}}},
  {id:8,refs:['newkirk','aviv','ciciolla'],
   en:{title:"Fair division of labor & mental load",subtitle:"Visible and invisible work",
       thesis:"Fairness matters in both visible chores and the invisible planning work. Perceived unfairness in household labor is linked to more relationship conflict, and unequal cognitive labor is independently associated with poorer relationship functioning and worse mental health for the partner carrying it.",
       opts:{2:"Chores, admin, planning, remembering, and emotional labor feel fair enough to both of us — and we renegotiate when life changes.",
             1:"Some imbalance exists, but both partners acknowledge it and are actively working to rebalance.",
             0:"One partner consistently carries the visible or invisible load and feels unseen, resentful, or dismissed when raising it."}},
   ko:{title:"역할 분담의 공정성",subtitle:"보이는 일과 보이지 않는 일",
       thesis:"공정성은 눈에 보이는 집안일과 보이지 않는 계획 작업(추적, 예상, 조직) 모두에서 중요합니다. 가사 노동에서 지각된 불공정함은 더 많은 관계 갈등과 연결되며, 불평등한 인지 노동은 독립적으로 더 나쁜 관계 기능 및 이를 담당하는 파트너의 더 나쁜 정신 건강과 관련됩니다.",
       opts:{2:"집안일, 행정, 계획, 기억, 감정 노동이 두 분 모두에게 충분히 공정하게 느껴지며, 삶이 변할 때 재협상합니다.",
             1:"일부 불균형이 존재하지만, 두 파트너 모두 이를 인정하며 적극적으로 재조정하고 있습니다.",
             0:"한 파트너가 지속적으로 보이는 또는 보이지 않는 부담을 지고 있으며, 이를 제기할 때 보이지 않거나, 억울함을 느끼거나, 무시당하는 느낌을 받습니다."}}},
  {id:9,gate:true,hw:true,refs:['mallory'],
   en:{title:"Sexual communication & intimacy",subtitle:"Safety and openness to talk",
       thesis:"Sexual readiness is less about 'perfect chemistry' and more about the ability to talk safely about consent, desire differences, pain, contraception, health, and preferences. Better sexual communication is reliably associated with both relationship and sexual satisfaction across multiple meta-analyses.",

       opts:{2:"성관계에 대해 — 동의, 욕구 차이, 경계, 피임, 통증, 선호도를 포함하여 — 개방적이고 존중하는 방식으로 이야기할 수 있습니다.",
             1:"주제가 때로 어색하거나 회피되지만, 정말 중요할 때는 소통할 수 있습니다.",
             0:"성관계에 두려움, 수치심, 강압, 지속적으로 무시된 통증, 또는 안전하게 논의할 수 없음이 포함됩니다."}}},
  {id:10,refs:['lebow','megale','carroll'],
   en:{title:"Growth mindset & help-seeking",subtitle:"Openness to learning and support",
       thesis:"Relationship skills are learnable. Couple therapy and structured relationship education can meaningfully improve distress, communication, and mutual support — meaning openness to learning and help-seeking is a genuine resilience factor, not a sign of weakness.",
       opts:{2:"We believe relationship skills can be learned. We are open to feedback, self-improvement tools, and professional support if needed — before a crisis, not only during one.",

       thesis:"관계 기술은 배울 수 있습니다. 커플 치료와 구조화된 관계 교육은 고통, 소통, 상호 지지를 의미 있게 향상시킬 수 있습니다 — 이는 배움과 도움 요청에 대한 개방성이 나약함의 표시가 아니라 진정한 회복력 요소임을 의미합니다.",

let S={
  screen:'intro', lang:'en', mode:null,
  names:{A:'',B:''},
  scores:{A:Array(10).fill(null),B:Array(10).fill(null)},
  partner:'A', qIdx:0, result:null, loading:false, error:null, hasSafety:false
};

const set=p=>{S={...S,...p};render();};
const t=()=>T[S.lang];
const q=()=>Q[S.qIdx];
const qL=()=>Q[S.qIdx][S.lang];
const nOf=p=>S.names[p]||(p==='A'?(S.lang==='ko'?'파트너 A':'Partner A'):(S.lang==='ko'?'파트너 B':'Partner B'));
const abbr=str=>str.length>8?str.slice(0,7)+'…':str;

function setLang(l){
  S.lang=l;
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  document.getElementById('btn-ko').classList.toggle('active',l==='ko');
  render();
}

function toggleAcc(id){
  const body=document.getElementById('acc-'+id+'-body');
  const chev=document.getElementById('acc-'+id+'-chev');
  const btn=document.getElementById('acc-'+id+'-btn');
  if(!body)return;
  const open=body.classList.contains('open');
  body.classList.toggle('open',!open);
  if(btn)btn.classList.toggle('open',!open);
  if(chev)chev.style.transform=open?'':'rotate(90deg)';
}

function updateName(partner,value){
  S.names[partner]=value;
  const btn=document.getElementById('begin-btn');
  if(btn){
    const ok=S.mode&&S.names.A.trim()&&(S.mode==='single'||(S.mode==='couple'&&S.names.B.trim()));
    btn.disabled=!ok;
  }
}

function setScore(v){const s=JSON.parse(JSON.stringify(S.scores));s[S.partner][S.qIdx]=v;set({scores:s});}

function goNext(){
  if(S.qIdx<9)set({qIdx:S.qIdx+1});
  else if(S.mode==='couple'&&S.partner==='A')set({partner:'B',qIdx:0});
  else set({screen:'review'});
}
function goPrev(){
  if(S.qIdx>0)set({qIdx:S.qIdx-1});
  else if(S.mode==='couple'&&S.partner==='B')set({partner:'A',qIdx:9});
  else set({screen:'intro'});
}

function scoreBand(total,hasZeroFlag){
  const tr=t();
  if(hasZeroFlag)return{label:tr.bandFlags.safe,color:tr.bandFlags.color,bg:tr.bandFlags.bg};
  const bands=tr.scoreBands;
  if(total>=17)return bands[0];
  if(total>=13)return bands[1];
  if(total>=9) return bands[2];
  return bands[3];
}

function refPills(keys){
  return keys.map(k=>{
    const r=REFS[k];
    return `<a class="ref-pill" href="${r.url}" target="_blank" rel="noopener">↗ ${r.label}</a>`;
  }).join('');
}

async function analyze(){
  set({screen:'loading',loading:true,error:null});
  const nA=nOf('A'),nB=nOf('B');
  const safetyFlagA=S.scores.A[0]===0||S.scores.A[8]===0;
  const safetyFlagB=S.mode==='couple'&&(S.scores.B[0]===0||S.scores.B[8]===0);
  const hasSafety=safetyFlagA||safetyFlagB;
  const tr=t();
  const langInst=tr.promptInstruction;
  let prompt;
  if(S.mode==='couple'){
    const rows=Q.map((q,i)=>{
      const ql=q[S.lang];
      return `Item ${q.id} (${ql.title}): ${nA}=${S.scores.A[i]}, ${nB}=${S.scores.B[i]}${q.hw?' [high-weight]':''}${q.gate?' [safety-gatekeeper]':''}`;
    }).join('\n');
    prompt=`${tr.promptRole}${langInst?' '+langInst:''}

Two partners named ${nA} and ${nB} independently completed a relationship readiness reflection (0=significant concern, 1=some growth needed, 2=doing well).

Results:
${rows}

${hasSafety?`CRITICAL: A safety-gatekeeper item (Item 1 or Item 9) scored 0. Lead with this concern directly and warmly. Place it first in flags. Do not minimize it.`:''}

Return ONLY valid JSON, no markdown, no code fences:
{"overview":"2-3 honest sentences on the overall picture, addressing them by name${hasSafety?'. Open by naming the safety concern directly — warmly but clearly':''}","flags":[{"item":"Item N: title","concern":"1-2 sentences"}],"strengths":["sentence using their names"],"growthAreas":[{"area":"short label","advice":"2-3 actionable sentences"}],"closing":"1-2 warm sentences to both ${nA} and ${nB}${hasSafety?'. Affirm that seeking support is an act of courage':''}"}

${langInst}
Rules: use ${nA} and ${nB} by name. Safety-gatekeeper 0s first in flags. Then other 0s, both at 1 on high-weight, discrepancy ≥2. 2-4 genuine strengths, 2-4 growth areas. Warm, concrete, never preachy.`;
  } else {
    const rows=Q.map((q,i)=>{
      const ql=q[S.lang];
      return `Item ${q.id} (${ql.title}): ${nA}=${S.scores.A[i]}${q.hw?' [high-weight]':''}${q.gate?' [safety-gatekeeper]':''}`;
    }).join('\n');
    prompt=`${tr.promptRole}${langInst?' '+langInst:''}

A person named ${nA} reflected on their relationship from their own perspective (0=significant concern, 1=some growth needed, 2=doing well).

Results:
${rows}

${hasSafety?`CRITICAL: A safety-gatekeeper item (Item 1 or Item 9) scored 0. Lead with this concern directly and warmly. Place it first in flags. Do not minimize it.`:''}

Return ONLY valid JSON, no markdown, no code fences:
{"overview":"2-3 honest sentences on what ${nA}'s scores reveal${hasSafety?'. Open by naming the safety concern directly — warmly':''}","flags":[{"item":"Item N: title","concern":"1-2 sentences"}],"strengths":["sentence addressing ${nA} directly"],"growthAreas":[{"area":"short label","advice":"2-3 sentences for ${nA} personally"}],"closing":"1-2 warm sentences to ${nA}${hasSafety?'. Affirm that recognizing this and seeking support takes courage':''}"}

${langInst}
Rules: use ${nA} by name. Safety 0s first in flags. Then other 0s or 1s on high-weight. 2-4 genuine strengths, 2-4 growth areas. Warm, concrete, never preachy.`;
  }
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1400,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    if(data.error)throw new Error(typeof data.error==='object'?data.error.message:data.error);
    const txt=data.content?.map(b=>b.text||'').join('')||'';
    const parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
    set({result:parsed,screen:'results',loading:false,hasSafety});
  }catch(e){set({error:(S.lang==='ko'?'분석 실패: ':'Analysis failed: ')+(e.message||'Please try again.'),screen:'review',loading:false});}
}

function badge(v){

  return`<div class="score-badge ${SC[v].cls}">${v}</div>`;
}

      ${error?`<div style="background:#FAE8E5;border:1px solid #A85240;border-radius:8px;padding:12px 16px;margin-bottom:18px;font-size:14px;color:#A85240">${error}</div>`:''}
      <div class="card" style="overflow:hidden;margin-bottom:22px">
        <div style="display:grid;grid-template-columns:${cols}" class="review-head">
          <div>${tr.itemCol}</div>
          <div style="text-align:center;color:${PC.A}">${abbr(nA)}</div>
          ${isCouple?`<div style="text-align:center;color:${PC.B}">${abbr(nB)}</div>`:''}
        </div>
        ${Q.map((q,i)=>{
          const sA=scores.A[i],sB=scores.B[i];
          const disc=isCouple&&sA!==null&&sB!==null&&Math.abs(sA-sB)>=2;
          const ql=q[lang];
          return`<div style="display:grid;grid-template-columns:${cols}" class="review-row">
            <div class="review-cell"><span style="color:#6B645C;font-size:12px;margin-right:6px">${q.id}.</span>${ql.title}${q.hw?`<span class="tag-key">${tr.key}</span>`:''}${disc?`<span style="font-size:10px;background:#FAE8E5;color:#A85240;padding:1px 5px;border-radius:3px;margin-left:5px">${tr.gap}</span>`:''}</div>
            <div class="review-cell center">${badge(sA)}</div>
            ${isCouple?`<div class="review-cell center">${badge(sB)}</div>`:''}
          </div>`;
        }).join('')}
      </div>
      <div style="display:grid;grid-template-columns:${isCouple?'1fr 1fr':'180px'};gap:12px;margin-bottom:10px">
        <div class="total-card">
          <div style="font-size:12px;color:#6B645C;margin-bottom:4px">${nA}</div>
          <div class="serif" style="font-size:42px;font-weight:500;color:${PC.A};line-height:1">${tA}</div>
          <div style="font-size:12px;color:#6B645C;margin-top:2px">${tr.outOf}</div>
        </div>
        ${isCouple?`<div class="total-card">
          <div style="font-size:12px;color:#6B645C;margin-bottom:4px">${nB}</div>
          <div class="serif" style="font-size:42px;font-weight:500;color:${PC.B};line-height:1">${tB}</div>
          <div style="font-size:12px;color:#6B645C;margin-top:2px">${tr.outOf}</div>
        </div>`:''}
      </div>
      <div style="margin-bottom:26px">
        <div style="font-size:11px;font-weight:500;color:#6B645C;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">${tr.readingLabel}</div>
        <div style="font-size:13px;color:${bandA.color};background:${bandA.bg};padding:8px 12px;border-radius:6px;margin-bottom:${bandB?'6px':'0'}">${nA}: ${bandA.label}</div>
        ${bandB?`<div style="font-size:13px;color:${bandB.color};background:${bandB.bg};padding:8px 12px;border-radius:6px">${nB}: ${bandB.label}</div>`:''}
        <p style="font-size:11px;color:#aaa;margin-top:7px">${tr.bandNote}</p>
      </div>
      <div style="display:flex;gap:12px;justify-content:flex-end">
        <button class="btn-ghost" onclick="set({screen:'questions',partner:'A',qIdx:0})">${tr.editBtn}</button>
        <button class="btn-primary" onclick="analyze()">${tr.analyzeBtn}</button>
      </div>
    </div>`;
  }

  /* ── LOADING ── */
  else if(screen==='loading'){
    html=`<div class="screen ${tr.langClass}" style="padding-top:110px;text-align:center">
      <div class="spin"></div>
      <p class="serif" style="font-size:24px;color:#6B645C;font-style:italic">${tr.loadingText}</p>
      <p style="font-size:13px;color:#aaa;margin-top:10px">${tr.loadingNote}</p>
    </div>`;
  }

  /* ── RESULTS ── */
  else if(screen==='results'&&result){
    const {overview,flags,strengths,growthAreas,closing}=result;
    const tA=scores.A.reduce((a,b)=>a+(b??0),0);
    const tB=scores.B.reduce((a,b)=>a+(b??0),0);
    const hasZeroFlagA=scores.A[0]===0||scores.A[8]===0;
    const hasZeroFlagB=scores.B[0]===0||scores.B[8]===0;
    const bandA=scoreBand(tA,hasZeroFlagA);
    const bandB=isCouple?scoreBand(tB,hasZeroFlagB):null;
    html=`<div class="screen ${tr.langClass}" style="padding-top:44px">
      <div style="font-size:11px;letter-spacing:.12em;color:#6B645C;text-transform:uppercase;margin-bottom:10px">${tr.analysisTag}</div>
      <h2 class="serif" style="font-size:36px;font-weight:400;color:#1B1714;margin-bottom:22px;font-style:italic">${tr.analysisTitle}</h2>
      <div style="display:grid;grid-template-columns:${isCouple?'1fr 1fr':'1fr'};gap:10px;margin-bottom:18px">
        <div style="background:${bandA.bg};border-radius:10px;padding:14px 16px;text-align:center">
          <div style="font-size:12px;color:#6B645C;margin-bottom:4px">${nOf('A')}</div>
          <div class="serif" style="font-size:38px;font-weight:500;color:${bandA.color};line-height:1;margin-bottom:5px">${tA}<span style="font-size:18px;color:#aaa"> / 20</span></div>
          <div style="font-size:12px;color:${bandA.color}">${bandA.label}</div>
        </div>
        ${isCouple&&bandB?`<div style="background:${bandB.bg};border-radius:10px;padding:14px 16px;text-align:center">
          <div style="font-size:12px;color:#6B645C;margin-bottom:4px">${nOf('B')}</div>
          <div class="serif" style="font-size:38px;font-weight:500;color:${bandB.color};line-height:1;margin-bottom:5px">${tB}<span style="font-size:18px;color:#aaa"> / 20</span></div>
          <div style="font-size:12px;color:${bandB.color}">${bandB.label}</div>
        </div>`:''}
      </div>
      ${S.hasSafety?`<div style="background:#FAE8E5;border:1.5px solid #A85240;border-radius:12px;padding:20px 22px;margin-bottom:18px">
        <div style="font-size:12px;font-weight:500;color:#A85240;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">${tr.supportTitle}</div>
        <p style="font-size:14px;color:#7A3428;line-height:1.68;margin-bottom:14px">${tr.supportBody}</p>
        <ul style="list-style:none;padding:0;display:flex;flex-direction:column;gap:7px">
          <li><a href="https://www.thehotline.org" target="_blank" style="color:#A85240;font-size:14px">${tr.hotline}</a></li>
          <li><a href="https://www.rainn.org" target="_blank" style="color:#A85240;font-size:14px">${tr.rainn}</a></li>
          <li style="font-size:14px;color:#6B645C">${tr.therapist}</li>
        </ul>
      </div>`:''}
      <div class="card" style="padding:22px 24px;margin-bottom:18px">
        <p style="font-size:15px;line-height:1.78;color:#1B1714;margin:0">${overview}</p>
      </div>
      ${flags&&flags.length?`<div class="section" style="background:#FAE8E5;border:1px solid #A85240">
        <div class="section-title" style="color:#A85240">${tr.flagsTitle}</div>
        ${flags.map((f,i)=>`<div style="${i<flags.length-1?'margin-bottom:16px':''}"><div style="font-size:13px;font-weight:500;color:#A85240;margin-bottom:4px">${f.item}</div><div style="font-size:14px;color:#1B1714;line-height:1.65">${f.concern}</div></div>`).join('')}
      </div>`:''}
      ${strengths&&strengths.length?`<div class="section" style="background:#EAF3EC;border:1px solid #3D6E50">
        <div class="section-title" style="color:#3D6E50">${tr.strengthsTitle}</div>
        <ul style="list-style:none;padding:0;display:flex;flex-direction:column;gap:10px">
          ${strengths.map(s=>`<li style="display:flex;gap:10px;align-items:flex-start"><span style="color:#3D6E50;margin-top:3px;font-size:13px;flex-shrink:0">✓</span><span style="font-size:14px;line-height:1.65;color:#1B1714">${s}</span></li>`).join('')}
        </ul>
      </div>`:''}
      ${growthAreas&&growthAreas.length?`<div class="section" style="background:#FBF5E6;border:1px solid #8B6A1A">
        <div class="section-title" style="color:#7C5E1A">${tr.growthTitle}</div>
        ${growthAreas.map((g,i)=>`<div style="${i<growthAreas.length-1?'margin-bottom:18px':''}"><div style="font-size:13px;font-weight:500;color:#7C5E1A;margin-bottom:5px">${g.area}</div><div style="font-size:14px;color:#1B1714;line-height:1.65">${g.advice}</div></div>`).join('')}
      </div>`:''}
      ${closing?`<div class="card" style="padding:20px 24px;margin-bottom:8px"><p class="serif" style="font-size:19px;line-height:1.72;color:#6B645C;font-style:italic;margin:0">"${closing}"</p></div>`:''}
      <p style="font-size:11px;color:#aaa;line-height:1.55;margin-bottom:24px;padding:0 2px">${tr.disclaimerNote}</p>
      <button class="btn-ghost" onclick="restart()">${tr.restartBtn}</button>
    </div>`;
  }

  document.getElementById('root').innerHTML=html;
}

function restart(){
  set({screen:'intro',mode:null,names:{A:'',B:''},scores:{A:Array(10).fill(null),B:Array(10).fill(null)},partner:'A',qIdx:0,result:null,loading:false,error:null,hasSafety:false});
}

render();
</script>
</body>
</html>
